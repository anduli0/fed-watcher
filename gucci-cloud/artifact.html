s its two primary axes. When the four components are decomposed into score contributions, virtually the entire inter-region gap today is attributable to a single component: sentiment. With Buzz (10.0 points) and Engagement (7.5 points) identical and fixed across all regions, and the SOV contribution range below 1 point maximum, the 34.27-point gap between Southeast Asia and Europe breaks down as 33.55 points from sentiment and just 0.72 points from SOV [1].\n\n## 1. Today's Index at a Glance\n\nThe table below brings together every number computed today. GMAI is a composite score from 0 to 100 compressing how attractive Gucci currently appears in a given region; the band translates that score into a plain-language status tier. NSS (Net Sentiment Score) places the positive-versus-negative balance of coverage and posts on a scale from -1 (fully negative) to +1 (fully positive), and the four components that follow — Sentiment, Buzz, Engagement, and SOV — are the 0–1 raw inputs that compose the GMAI. The final three columns show how many articles supported the judgment (positive/neutral/negative counts and total count).\n\n| Region | GMAI | Band | NSS | Sentiment | Buzz | Engagement | SOV | Pos/Neu/Neg | Total |\n|---|---|---|---|---|---|---|---|---|---|\n| Global Composite | 38.01 | Caution | — | 0.391 (weighted) | — | — | — | — | — |\n| Southeast Asia (SEA) | 54.41 | Neutral | +0.50 | 0.75 | 0.50 | 0.50 | 0.158 | 13/0/1 | 14 |\n| Northeast Asia (NEA) | 43.41 | Caution | 0.00 | 0.50 | 0.50 | 0.50 | 0.171 | 5/5/1 | 11 |\n| North America (NA) | 42.59 | Caution | +0.00 | 0.50 | 0.50 | 0.50 | 0.129 | 6/4/4 | 14 |\n| Europe (EU) | 20.14 | Alert | -0.99 | 0.004 | 0.50 | 0.50 | 0.122 | 8/0/6 | 14 |\n\nThe global composite of 38.01 is the weighted average of the four regional scores using regional weights (NEA 0.35, EU 0.28, NA 0.25, SEA 0.12). Europe, holding the second-largest weight, pulls the composite sharply downward because its score is in the 20-point range. The single alert triggered today is that Europe has entered the Alert band (GMAI = 20.14), a signal that mandates a post-hoc root-cause analysis [1].\n\n## 2. How to Read the Index\n\nA GMAI score for a given region is built by blending four components in fixed proportions. Sentiment carries the largest share at 45 percent; SOV accounts for 20 percent; Buzz for 20 percent; and Engagement for 15 percent. Each component is normalized to a 0–1 value, blended in these proportions, and then multiplied by 100 to produce a 0–100 score. The reason for assigning sentiment the largest weight is clear: the index is designed so that no matter how loudly something is discussed (high Buzz), if the content is negative the score does not rise — in other words, it is built so that bad news cannot inflate the index.\n\nThe four components in plain terms are as follows. Sentiment measures how broadly favorable or hostile coverage and posts in a region are toward Gucci overall. Buzz measures whether today's volume of mentions is higher or lower than usual (the prior 30-day average). Engagement measures how deeply people actually responded (likes, comments, shares). And SOV (Share of Voice) is Gucci's share of the total conversation relative to seven competing luxury brands (Louis Vuitton, Dior, Chanel, Prada, Bottega Veneta, Saint Laurent, Balenciaga) over the same period.\n\nBands translate a score into a five-state signal. Above 75 is Strong; 60–74 is Favorable; 45–59 is Neutral; 30–44 is Caution; and 29 or below is Alert. Today Europe is the only region in the Alert range.\n\nNSS is the raw value at the stage immediately before the sentiment component is computed. Each individual article is assigned +1 if positive, 0 if neutral, or -1 if negative, and then multiplied by a weight reflecting source credibility, reach, and recency and averaged. The result falls between -1 and +1: near 0 means positive and negative are in rough balance; near -1 means negative is overwhelming. Adding 1 to NSS and dividing by 2 converts it into the 0–1 sentiment component. For example, Europe's NSS today is -0.99, essentially pinned at fully negative, which translates into the extremely low sentiment raw score of 0.004 and drags the EU GMAI into the 20-point range.\n\n## 3. What Today's Numbers Mean\n\nIt is important first to be transparent about why the global composite sits in Caution. Just before finalizing today's index, the method for computing the SOV component was changed. Under the prior computation the global score would have been 45.71 — more than 7 points higher — but a substantial portion of that additional height came not from actual performance but from a collection-bias illusion. The initial SOV was calculated by counting brand mentions within a pool of articles gathered by targeting \"Gucci,\" which structurally inflated Gucci mention counts. In the EU raw pool, for instance, Gucci appeared 14 times while the combined total for the seven competing brands was around 20, which would push Gucci's SOV all the way to 45 percent if taken at face value. This was replaced with an objective method: for each brand, the same neutral query (\"&lt;brand&gt; news/coverage,\" same period, same source set) was run once, and the resulting article counts were tallied symmetrically across brands (data/sov/2026-07-03.json) [2]. Under this symmetric aggregation, EU Gucci is 5 out of 41, giving an SOV of 0.122, and all four regions settled into realistic values in the 12–17 percent range. Today's composite of 38.01 is the honest starting point after stripping out that bias.\n\nEurope's Alert is a genuine result, not a metric malfunction. Of the 14 EU items today, 6 are negative, and those negative articles carry particularly heavy weight. The standouts are: the Kering Q1 earnings report showing Gucci revenue falling 14 percent on a reported basis (8 percent on a comparable basis) to €1.35bn; a France24 report on the restructuring announced at the April Capital Markets Day (20 percent reduction in selling area, one-third cut in outlet doors, Western Europe retail -7 percent); and a skeptical analysis marking €3.8bn in revenue lost over two years and framing the Demna appointment as a long-term bet made under pressure for near-term results [5][6][7]. Adding to this was the incident in which AI-generated advertising released ahead of the Milan debut drew \"cheap\" and \"at odds with luxury craftsmanship\" criticism on social platforms and was subsequently withdrawn [3]. Notably, Europe also had 8 positive articles — the standing ovation at Demna's debut show, \"instant classic\" praise for the Borsetto and Paparazzo bags, the Monte Carlo campaign reception. Nevertheless, sentiment fell to 0.004, because the negative articles were mostly top-tier sources (T1/T2) on heavy subjects such as results and strategy, while the positives were collection and campaign reviews carrying comparatively lighter weight. The band is an accurate reflection of which narrative currently dominates the conversation in Europe.\n\nWhy Southeast Asia fares comparatively better is equally clear. Of the 14 SEA items, 13 were positive, and those positives were not structural negatives like earnings but culturally embedded regional activations: Thai artist TIMETHAI's ELLE Men July cover, the Generation Gucci launch at Marina Bay Sands with Chinese actress Tian Xi Wei generating buzz, and the sustained activity of Thai ambassadors Gulf Kanawut and Billkin, reflecting SEA's growing importance as a global audience for the brand [9][10]. The only negative article was a single Reuters earnings piece, so the negative weight was shallow, and as a result sentiment reached 0.75 — the only region today above 0.50 — lifting GMAI into the Neutral band. Northeast Asia and North America are tied in the middle of Caution because positive and negative largely balanced out. NEA saw the positive effects of Jin (BTS) and Lee Know (Stray Kids) ambassador activity and Japan and Korea exclusive collections offset by the structural negative of Asia-Pacific retail -4 percent, producing an NSS that converged exactly to zero. NA saw the positive signal of Cruise 2027 Times Square show praise and North America revenue +8–9 percent squaring off against the AI advertising backlash and earnings skepticism, sending NSS to near zero [7][8].\n\n## 4. Statistical Decomposition of Inter-Region Gaps\n\nWhere Section 3 explained why each region is in its current band, this section arithmetically decomposes exactly which component is responsible for the point gaps between regions. Because GMAI is the sum of the four components' raw scores (0–1) multiplied by their weights (Sentiment 0.45, Buzz 0.20, Engagement 0.15, SOV 0.20) and then by 100, each region's score can be precisely decomposed into four \"score contributions (p).\" The table below breaks today's four-region GMAI into these four contributions, with each row summing to the GMAI for that region [1].\n\n| Region | GMAI | Sentiment (p) | Buzz (p) | Engagement (p) | SOV (p) |\n|---|---|---|---|---|---|\n| Southeast Asia (SEA) | 54.41 | 33.75 | 10.00 | 7.50 | 3.16 |\n| Northeast Asia (NEA) | 43.41 | 22.50 | 10.00 | 7.50 | 3.41 |\n| North America (NA) | 42.59 | 22.51 | 10.00 | 7.50 | 2.58 |\n| Europe (EU) | 20.14 | 0.20 | 10.00 | 7.50 | 2.44 |\n\nReading the table vertically, the structure of today's gaps becomes immediately apparent. The Buzz contribution is exactly 10.00p across all four regions, and the Engagement contribution is exactly 7.50p across all four regions — neither column contributes any inter-region differentiation whatsoever. These two components have not yet built baseline or social data and are fixed at 0.5, and multiplying 0.5 by the respective weights of 20 and 15 percent and then by 100 produces the identical constants of 10.0p and 7.5p. The SOV contribution ranges from 2.44p (EU) to 3.41p (NEA), but the maximum spread of 0.97p is insufficient to shift the regional ranking. The result is that the ranking and spread among the four regions today was determined almost entirely by the single Sentiment contribution column, which spans from 0.20p (EU) to 33.75p (SEA) — a spread of 33.55p.\n\nThis structure is confirmed by looking at specific region pairs. The largest gap today — 34.27 points between SEA and EU — comes from 33.55 points in sentiment (33.75 - 0.20) and 0.72 points in SOV (3.16 - 2.44), with zero contribution from Buzz and Engagement, so sentiment explains 97.9 percent of the gap. The 11.00-point gap between SEA and NEA also comes from sentiment's 11.25-point advantage offset by a 0.25-point SOV disadvantage. The 23.27-point gap between EU and NEA is the sum of 22.30 from sentiment and 0.97 from SOV. The exception is the razor-thin NEA-NA gap of 0.82 points — the only case today where the gap is driven not by sentiment but by SOV contribution (3.41 vs. 2.58, or 0.83p), since their sentiment contributions are effectively tied (22.50p vs. 22.51p, the NA NSS being a barely positive +0.0005). In summary, today's regional landscape is an extremely simple single-axis structure where sentiment sets the spread, Buzz and Engagement are silent, and SOV provides only micro-adjustment.\n\nWhat drove such divergence in sentiment contributions can be traced back to the raw data in each region. As confirmed in Section 3, sentiment is multiplied by recency weighting and in practice dominated by items published in the most recent few days; the composition of each region's most recent items precisely determines the level of each region's sentiment contribution. EU's sentiment contribution collapsing to 0.20p is the result of the most recent items being top-tier negative reporting on Kering's Q1 results (Gucci revenue -14% reported), the April CMD restructuring, and the AI advertising backlash. EU has 8 positive items — the standing ovation at Demna's debut and the Borsetto and Paparazzo bag praise — but they are lighter in weight as collection/campaign reviews, or their publication dates are farther back and their recency weights are smaller, while heavy and recent negative items on results, strategy, and controversy overwhelmed them [3][4][5][6][7]. Conversely, SEA's sentiment contribution standing alone at 33.75p is because the most recent items are positive across the board — TIMETHAI's ELLE Men July cover, the Generation Gucci launch at Marina Bay Sands with Tian Xi Wei, and ambassador editorial from Gulf Kanawut and Billkin — with only a single Reuters earnings article as negative material, making the weight of the negative shallow [9][10][12]. The same logic explains why NEA and NA are in the middle. Many of NEA's most recent items are brand-issued Kering Japan press releases or Korean limited-edition eyewear articles that are factual in tone and classified as neutral (0), offsetting positive and negative, while NA sees the Cruise 2027 Times Square show praise and North America sales strength directly opposed by the AI advertising backlash and \"not fixed yet\" earnings skepticism, driving NSS to near zero [8][13][14].\n\nThe outlook at this stage is presented only as a hypothesis based on a first-day sample. Hypothesis one is the persistence of a sentiment-led structure: until Buzz and Engagement are freed from their neutral-fixed state, today's one-axis structure where inter-region gaps are almost entirely determined by sentiment will continue, and in this environment the determining factor for regional rankings is how much heavy, recent negative material each region is carrying. Hypothesis two is the conditions for a EU rebound: since EU's 0.20p is the result of negative items monopolizing the top of the recency ranking, if positive product and collection coverage from Gucci returns to the top of the recency ranking during the Paris Haute Couture Week conversation surge (July 6–9), or if the rate of decline in Kering's Q2 (due July 29) narrows from Q1's -8% (comparable basis), heavy recent positives entering would cause the sentiment contribution to jump from the single-digit range into double digits and open a path for EU to exit the Alert band. Hypothesis three is the multi-axis diversification of the gap structure: once Buzz accumulates five or more days of baseline and social connectors bring Engagement into live data, those two components will come off their fixed constants and begin to disperse around their 10.0p and 7.5p midpoints — at which point today's single-axis dominance by sentiment will give way to a regional ranking determined by the composite of sentiment, buzz, and engagement. The symmetric risk is also present: if Q2 decline widens or a surge in competitor exposure during couture week suppresses Gucci's relative SOV, the EU Alert could entrench and the global composite could fall further.\n\n## 5. Caveats for Today's Numbers\n\nToday's reading has four unavoidable first-day limitations, and understanding each is necessary to avoid over-reading the numbers.\n\nFirst, the day-over-day delta is empty for all regions. Today is this system's first computation date and there is no yesterday to compare against. Since the true value of the index lies less in the absolute score than in the direction — \"has it improved or deteriorated since yesterday?\" — today's numbers should be treated only as the starting point of a trend, and directional judgments are only valid from Day 2 onward.\n\nSecond, Buzz is fixed at 0.5 across all four regions. Buzz measures whether today's volume of mentions is above or below the 30-day average, and the 30 days of historical data required to form that comparison baseline have not yet accumulated. The methodology specifies that when fewer than 5 baseline days exist, Buzz is set to the neutral value of 0.5 to suspend judgment; this is a designed conservatism, not an error. Today's Buzz reading should therefore be interpreted as \"no information\" rather than \"average level.\"\n\nThird, Engagement is also at 0.5 across all four regions. Engagement measures the depth of social response — likes, comments, shares — but the paid connectors required to pull detailed metrics from Instagram, TikTok, and X are not yet integrated, leaving reach and response figures null for most items. The methodology specifies that Engagement is set to 0.5 in this case. In practice, the only items in today's sample with reach or share counts were the Jin keyring post and Lee Know ambassador announcement tweet in NEA. This axis requires social connector integration before it can come alive.\n\nFourth, the index is heavily tilted toward the most recent few days of articles because of time decay. The weight applied to each article decays at a rate of 0.6× per elapsed day. Today's sample includes articles from as far back as February's Milan debut, but their decay coefficients are so small that they contribute almost nothing to the index. As a result, today's scores are dominated by the most recent coverage, and old positive reviews do not prop up the index — a factor that must be kept in mind.\n\n## 6. What to Watch Going Forward\n\nThe observation points from here are directly tied to the July calendar. The most imminent variable is Paris Haute Couture Week (July 6–9). Gucci is not an official couture participant, but couture week is a period during which the total volume of luxury conversation surges, competitor brand exposure spikes, and this can relatively suppress Gucci's SOV. In other words, if Gucci's SOV falls in the latter part of this week, the question to ask is whether that reflects Gucci-specific weakness or a rival's couture-driven surge in exposure.\n\nThe heaviest single variable is the Kering Q2 earnings release scheduled for July 29. Since the root of the negative sentiment that dragged Europe into the Alert band is precisely the Q1 results and CMD restructuring, the Q2 numbers are the single largest event that will determine where sentiment heads next. If Gucci's rate of revenue decline narrows from the Q1 comparable-basis -8%, positive coverage enters the most recent weighting position across not just Europe but all regions where earnings articles carry weight, and the path opens for GMAI to exit the Alert band. If the rate of decline widens, the EU Alert is likely to entrench and the global composite is at risk of further downward movement. Between now and then, whether the SEA cultural activation trend continues and whether the tight balance in NEA and NA tilts in either direction can be tracked day by day through the delta. In the coming weeks, once Buzz accumulates its baseline and social connectors come online to link Engagement to live data, the two currently suspended axes will come alive and the resolution of the reading will rise meaningfully.\n\n## Executive Summary\n\nToday marks the first daily run of the GMAI (Gucci Market Attractiveness Index), a deterministic 0–100 score computed per region and aggregated into a global composite of 38.01, which sits in the second-lowest \"Caution\" band. Southeast Asia leads at 54.41 (Neutral), while Northeast Asia (43.41) and North America (42.59) both fall into Caution, and Europe drops to 20.14, the sole \"Alert\" trigger of the day. Europe's collapse is genuine rather than a metric artifact: heavy negative coverage of Kering's Q1 results (Gucci revenue -14% reported), the April Capital Markets Day restructuring plan, and the AI-advertising backlash outweighed lighter positive collection reviews, pushing its sentiment component to 0.004. Crucially, before finalizing today's numbers we replaced the share-of-voice input: the prior global reading of 45.71 was inflated by a Gucci-targeted collection bias, and switching to symmetric per-brand counts lowered SOV to a realistic 12–17% range across regions. A point-contribution decomposition shows today's inter-region gaps are driven almost entirely by one component: Buzz (10.0p) and Engagement (7.5p) are identical across all regions (both held neutral), and the SOV contribution spread is under 1p, so the sentiment contribution — ranging from 0.20p (Europe) to 33.75p (Southeast Asia) — accounts for essentially the entire spread. The SEA-EU gap of 34.27p, for instance, is 33.55p sentiment plus just 0.72p SOV; the lone exception is the razor-thin NEA-NA gap (0.82p), which is SOV-driven since their sentiment contributions are effectively tied. Three caveats govern interpretation today: there is no day-over-day delta (first run), Buzz is held at 0.5 pending a 30-day baseline, and Engagement is held at 0.5 because paid social connectors are not yet wired in. Time decay also means the score is dominated by the most recent few days of coverage. The two events to watch are Paris Haute Couture Week (July 6–9), which may compress Gucci's relative SOV as rivals surge, and Kering's Q2 earnings on July 29, the single largest driver of where sentiment moves next. Read today as a clean, de-biased starting point, and judge trajectory from tomorrow onward.\n\n## Notes\n\n- GMAI (Gucci Market Attractiveness Index): A composite score from 0 to 100 compressing how attractive Gucci currently appears in a given region. Higher is more favorable. Composed by weighting Sentiment 45%, Buzz 20%, Engagement 15%, SOV 20% and multiplying by 100.\n- Band: A plain-language status tier for the GMAI score. 75+ Strong / 60–74 Favorable / 45–59 Neutral / 30–44 Caution / 0–29 Alert.\n- NSS (Net Sentiment Score): Each article's positive (+1) / neutral (0) / negative (-1) label multiplied by source, reach, and recency weights and averaged. Ranges from -1 (fully negative) to +1 (fully positive). Adding 1 and dividing by 2 converts it to the 0–1 sentiment component.\n- Sentiment: A 0–1 component measuring how broadly favorable or hostile coverage and posts are toward Gucci overall. The highest-weighted component at 45% in GMAI.\n- Buzz: Whether today's mention volume is above or below the 30-day average. Held at 0.5 if fewer than 5 baseline days have accumulated. Scale 0–1.\n- Engagement: Depth of response as measured by likes, comments, and shares. Set to 0.5 if figures are unavailable. Scale 0–1.\n- SOV (Share of Voice): Gucci's share of the conversation relative to 7 competing luxury brands. Uses symmetric neutral-query aggregation. Scale 0–1.\n- Delta: Day-over-day change in the index. Null on the first day because there is no prior day.\n\n## Sources\n\n[1] GUCCI INTELLIGENCE — 2026-07-03 GMAI computation results (regional scores, bands, triggers) — data/index/2026-07-03.json\n[2] GUCCI INTELLIGENCE — Per-brand SOV aggregation using symmetric neutral queries — data/sov/2026-07-03.json\n[3] Outlook Luxe — Gucci Sparks Backlash After Using AI Models For Milan Fashion Week Campaign — https://luxe.outlookindia.com/fashion-beauty/couture/gucci-sparks-backlash-after-using-ai-models-for-milan-fashion-week-campaign\n[4] Fashion Times UK — Gucci's 2026 Reset: Luxury Giant Faces Sales Slump and AI Backlash — https://www.fashiontimes.co.uk/gucci-2026-challenges-sales-ai-criticism-1760323\n[5] Retail Gazette — Kering unveils next phase of turnaround as Gucci weakness weighs on sales — https://www.retailgazette.co.uk/blog/2026/04/kering-unveils-next-phase-of-turnaround-as-gucci-weakness-weighs-on-sales/\n[6] France24 — Luxury group Kering seeks to make flagging Gucci 'unmissable' again — https://www.france24.com/en/live-news/20260416-luxury-giant-kering-to-chart-path-for-gucci-turnaround\n[7] Weshmind Journal — Is Gucci Worth Anything? Kering's Numbers in 2026 and the Capital Markets Day — https://weshmindjournal.com/journal/gucci-kering-turnaround-capital-markets-day-april-2026\n[8] Glossy — Kering's $3.9 billion quarter shows Gucci isn't fixed yet — https://www.glossy.co/fashion/kerings-3-9-billion-quarter-shows-gucci-isnt-fixed-yet/\n[9] ELLE Men Thailand — ELLE MEN COVER JULY 2026: TIMETHAI x Gucci Generation Collection — https://ellementhailand.com/timethai-x-gucci-cover-july-2026\n[10] L'Officiel Singapore — Tian Xi Wei Turns Heads at Gucci's Generation Gucci Launch in Singapore — https://www.lofficielsingapore.com/fashion/chinese-actress-tian-xi-wei-pursuit-of-jade-mbs-generation-gucci-launch-in-singapore-fashion-celebrity\n[11] GUCCI INTELLIGENCE — GMAI formula, band, and trigger specification — methodology/gmai-formula.md\n[12] GUCCI INTELLIGENCE — 2026-07-03 regional sentiment classification labels (pos/neu/neg, basis, recency) — data/sentiment/2026-07-03/{EU,SEA,NEA,NA}.json\n[13] GUCCI INTELLIGENCE — 2026-07-03 regional raw collected data (headline, source, URL) — data/raw/2026-07-03/{EU,SEA,NEA,NA}.json\n[14] The Impression — Gucci Summer 2026 Ad Campaign Review — https://theimpression.com/gucci-summer-2026-ad-campaign-review/\n"}, "api/report/daily/2026-07-03-luxury-brief.md": {"path": "daily/2026-07-03-luxury-brief.md", "content": "# 럭셔리 데일리 브리프 — 파리 꾸튀르 세대교체와 구찌의 이중 시험대\n\n2026-07-03 / 기간: 2026-07-03 단일 스냅샷 / GUCCI INTELLIGENCE\n\n## 목차\n\n1. 오늘의 GMAI 현황\n2. 파리 꾸튀르 세대교체 — 발렌시아가의 대리 채점\n3. 케링 내부 역학 — 구찌 홀로 -14%, 7월 29일 분수령\n4. 주얼리·경험·미국의 구조적 우위\n5. 구찌 뷰티 라이선스 이중 리스크\n6. EU GMAI 경고 — 이벤트 호조와 지역 심리의 괴리\n7. 구찌 포지셔닝 읽기 (GMAI/SOV 연결)\n8. 워치리스트\n\n## 핵심 요약\n\n7월 6~9일 파리 꾸튀르 주간의 발렌시아가·펜디 데뷔가 케링과 구찌 서사를 대리 채점하는 구도를 형성하고 있으며, 뎀나가 10년간 이끌던 발렌시아가에 대한 평가가 뎀나 이후 구찌 서사와 자연스럽게 대칭 비교된다. 주얼리·경험·미국이 구조적 우위를 유지하는 국면에서 구찌의 하이주얼리 약 140점 공개는 타이밍상 정합적이나, 소프트 럭셔리 부진과 뷰티 과도기 리스크가 그늘로 남아 있다. 이번 스냅샷은 SOV(언급 점유) 집계를 구찌 표적 수집 편향에서 8개 브랜드 대칭 검색 기반 객관 집계로 교체했으며, 그 결과 종전 0.45~0.64로 부풀려졌던 SOV가 0.12~0.17로 정상화되어(구찌는 경쟁사와 균형 수준) 전 지역 지수가 하향됐다. 글로벌 GMAI 38.01 주의는 회복까지 갈 길이 멂을 뜻하며, 7월 29일 케링 실적이 상방·하방 방향을 확정하는 분수령이 될 전망이다.\n\n## 1. 오늘의 GMAI 현황\n\n글로벌 GMAI는 38.01로 주의이며, 지역별로는 SEA 54.41 중립, NEA 43.41 주의, NA 42.59 주의, EU 20.14 경고로 나뉜다. 트리거는 EU의 경고 밴드 진입이다. 이번 스냅샷은 SOV 집계를 대칭 검색 기반 객관 집계로 교체한 결과로, 종전 편향 집계의 0.45~0.64가 0.12~0.17(SEA 0.1579, NEA 0.1707, NA 0.129, EU 0.122)로 정상화되며 전 지역 지수를 끌어내렸다. 이 리포트는 관측 데이터에 대한 제3자 종합 해석 리포트로서, 모든 판단은 입력 파일에 근거하며 인과가 불확실한 대목은 (가설)로 표기한다[1].\n\n## 2. 파리 꾸튀르 세대교체 — 발렌시아가의 대리 채점\n\n7월 6~9일 파리 꾸튀르 주간에는 피촐리의 발렌시아가 꾸튀르 데뷔(7/8), 치우리의 펜디 로마 꾸튀르(7/9), 그리고 블라지의 샤넬과 앤더슨의 디올 2번째 꾸튀르가 집중된다[2][3][4]. 이 일정이 중요한 이유는 발렌시아가가 뎀나가 10년간 이끌던 하우스이기 때문이다. 뎀나 이후 발렌시아가의 반응은 뎀나 이후 구찌 서사와 자연스럽게 대칭 비교되며, 케링의 두 브랜드에 걸쳐 동시 채점 구도가 형성된다.\n\n파장을 보면, 득은 피촐리의 발렌시아가와 치우리의 펜디처럼 꾸튀르에 진입하는 하우스가 정점 포지셔닝을 강화한다는 점이다. 반면 실은 꾸튀르 서비스가 없는 구찌가 상대적 격상 수단의 부재를 드러낸다는 점이며, 발렌시아가가 혹평을 받을 경우 뎀나 방법론 전반에 대한 의문이 확산될 위험도 있다(가설). 구찌 시사점으로는, 7월 6~9일 발렌시아가 데뷔 반응을 구찌 프리마베라 서사의 선행 지표로 모니터링하고, 꾸튀르 부재를 하이주얼리 140점과 피렌체 헤리티지 서사로 대체 격상하는 논리를 선제적으로 정비해야 한다.\n\n## 3. 케링 내부 역학 — 구찌 홀로 -14%, 7월 29일 분수령\n\n1분기 케링 그룹 매출은 -6%(€35.7억)였는데, 생로랑·보테가·발렌시아가가 성장하는 가운데 구찌만 -14%를 기록했다. 드 메오 CEO의 리콘케링(ReconKering)은 2030년까지 250개 이상 매장 폐점과 브랜드별 리셋을 예고했으며, 차기 실적은 7월 29일이다[5][6][7]. 동시에 성장하는 자매 브랜드와 두 자릿수 역성장의 대비는 하락 원인이 거시만이 아니라 구찌 고유의 문제임을 수치로 확증한다. 자원 배분 논리상 구찌 회복은 그룹 최상위 의제로 고정된다.\n\n파장을 보면, 득은 자원과 주목의 우선권을 갖는 생로랑·보테가이고, 실은 회복을 입증하기 전까지 투자 회수 압박을 받는 구찌다. 드 메오의 매장 폐점 기조는 구찌 직영·풀프라이스 재편과 채널 축소 압력으로 연결될 수 있다(가설). 구찌 시사점으로는, 7월 29일 실적에서 프리마베라 초기 판매와 2분기 지역별 수치(북미 개선 지속)가 턴어라운드 신뢰의 실질 근거가 된다는 점이다. 그 전까지는 매출 반등이 아니라 하락 둔화·질적 개선 프레임으로 기대치를 관리해야 한다.\n\n## 4. 주얼리·경험·미국의 구조적 우위\n\n바인-알타감마 여름 업데이트는 2026년 개인 럭셔리가 2~4% 성장하고, 경험 소비(여행·다이닝)가 3~7%로 선행하며, 주얼리가 최호조이고, 미국이 2021년 이후 처음으로 성장 주도 시장이 되었다고 진단했다. 리슈몽 주얼리는 FY2026 매출 +14%, 영업이익률 30.5%를 기록했고, 구찌는 꾸튀르 기간에 맞춰 하이주얼리 약 140점과 4개 패밀리를 공개한다[8][9][10]. 이것이 중요한 이유는, 구찌의 주력인 가죽제품이 부진한 반면 주얼리는 가격 인상 수용도와 자기구매 수요로 구조적 우위를 갖는 국면이기 때문이다. 구찌가 소프트 럭셔리 의존을 낮추고 하드 럭셔리로 믹스를 옮기는 것은 시장 방향과 일치한다. 다만 티파니(로데오·코스타메사 대형 플래그십), 반클리프(180피스 이집트), 불가리(전환형 65점) 등 경쟁 하이주얼리 공세도 동시에 진행 중이다.\n\n파장을 보면, 득은 주얼리 마진 우위를 갖는 그룹(리슈몽·LVMH 주얼리)이고, 실은 가방 중심 그룹(케링 포함)의 구조적 마진 열위가 노출된다는 점이다. 미국 성장 주도 전환은 삭스 파산 졸업과 매장 49개 축소로 도매 채널이 재편되는 가운데 직영 비중 확대 압박으로 이어진다(가설). 구찌 시사점으로는, 하이주얼리 140점이 타이밍상 최적이라는 점이다. VIC 공략은 셀럽 앰배서더 체계화(불가리·티파니 벤치마크)와 지역 순차 론칭 설계가 관건이며, 미국 성장 전환에 맞춰 NA 직영·부티크 경험 투자의 우선순위를 상향해야 한다.\n\n## 5. 구찌 뷰티 라이선스 이중 리스크\n\n로레알이 €46억에 케링 보떼를 인수 완료하며 발렌시아가·보테가 향수의 50년 라이선스를 확보했다. 구찌 뷰티는 2028년 Coty 계약 만료 후 로레알로 이관될 예정이다. 동시에 Coty의 영국 상사법원 소송이 계류 중이며, 이는 연 약 $6억 구찌 리테일 매출 리스크를 안고 있다[11][12]. 이것이 중요한 이유는, 로레럭스가 향수를 성장 엔진(프라다·YSL·발렌티노 등)으로 삼아 시장을 상회하는 성장을 하고 있어 이관 후 구찌 향수의 업사이드가 크지만, 이관 전 과도기(현 Coty·소송 계류)에는 제품 출시와 마케팅의 연속성이 흔들릴 위험이 있기 때문이다. 로레알-OpenAI 제휴로 ChatGPT 제품 추천 채널까지 선점되면서 소규모 라이선스 브랜드의 발견 경쟁 열위도 우려된다(가설).\n\n파장을 보면, 득은 장기 구찌 향수 포트폴리오를 갖는 로레럭스이고, 실은 브랜드 연속성이 불안정한 과도기 구찌 뷰티와 사업이 축소되는 Coty다. 라반느 1 Million Black, 톰포드 등 남성 프레스티지 향수 공세가 동일 소비자층을 직접 겨냥하고 있다. 구찌 시사점으로는, 이관 전 2년의 무주공산 리스크 관리가 핵심이라는 점이다. 소송 결과와 무관하게 향수 마케팅의 최소 연속성을 확보하고, 이관 후 로레럭스 성장 방정식에 태울 브랜드 자산(플로라·향 아이덴티티)을 정비해야 한다.\n\n## 6. EU GMAI 경고 — 이벤트 호조와 지역 심리의 괴리\n\nEU GMAI는 20.14로 경고이며, NSS -0.9912, 감성 0.0044(긍정 8건/부정 6건이나 부정 강도가 지배)로 SEA 54.41 중립과 대비된다[8]. 파리 꾸튀르·하이주얼리 등 유럽발 이벤트가 몰리는데도 EU 지역 심리 지표가 경고 밴드로 급락한 것은, 이벤트 화제성과 소비자 체감 심리(관세·거시·서유럽 부진)의 괴리를 시사한다. 구찌 1분기 부진도 서유럽과 중국이 진앙이었다. 파장을 보면, 실은 서유럽 매출 비중이 높은 브랜드이고 득은 SEA·미국 노출이 큰 포트폴리오다. 다만 지수는 심리 신호이며 매출 확정치는 아니다. 구찌 시사점으로는, 단기 유럽 심리 경고 국면에서는 SEA 우호와 NA 회복을 매출 방어의 축으로 삼고, 유럽은 이벤트(꾸튀르·하이주얼리)로 버즈를 유지하되 매출 기대치는 보수적으로 관리해야 한다.\n\n## 7. 구찌 포지셔닝 읽기 (GMAI/SOV 연결)\n\n지수 위치를 보면, 글로벌 GMAI 38.01 주의이며 NEA는 43.41·SOV 0.1707로 주의 밴드에 있다. SEA는 중립(SOV 0.1579), EU는 경고(SOV 0.122·감성 붕괴)다. 구찌 실적(1Q -14%)과 대비하면 지수는 하락 둔화를 가리키는 반면 실적은 여전한 절대 부진을 가리키는 이원 신호로 읽힌다.\n\nSOV 관점에서 중요한 변화는, 이번 스냅샷부터 8개 브랜드 대칭 검색 기반 객관 집계(data/sov/2026-07-03.json)로 교체되면서 종전 구찌 표적 수집이 부풀린 0.45~0.64가 사라지고 구찌의 언급 점유가 경쟁사와 균형 수준임이 드러난 것이다[18]. NEA에서 구찌는 샤넬과 공동 1위(각 7건)이고, SEA·NA·EU에서는 선두 브랜드(각각 루이비통·보테가베네타·루이비통) 바로 아래 2위권으로, 구체적으로 SEA는 루이비통 4건 대비 구찌 3건(보테가·발렌시아가와 공동 2위), NA는 보테가 5건 대비 구찌 4건(다수 브랜드와 공동 2위), EU는 루이비통 6건 대비 구찌 5건(나머지 6개 브랜드와 동률)이다. 즉 화제 점유는 어느 지역에서도 구찌가 압도하지 못하며 경쟁사와 균형을 이루는 수준이고, 이 정상화가 지수 하향의 주된 요인이다. K팝 앰배서더(에스파 닝닝), 징둥 플래그십, 테니스(사발렌카·신네르) 마케팅은 NEA/SEA 버즈 유지에 정합적으로 작동하나, 대칭 집계상으로는 아직 경쟁사 균형을 넘어서는 우위로 전환되지 못했다[13][14][15].\n\n상대 위치는 이벤트 서사(프리마베라 7월 출시·하이주얼리·WWD 갤러리)는 활발하나 매출 전환·유럽 심리·언급 점유 우위는 미검증인 국면으로 요약된다. 지수의 주의 밴드는 회복까지 여유가 크지 않음을 뜻한다. 발렌시아가 꾸튀르 데뷔(7/8)와 케링 실적(7/29)이 상방·하방 방향을 확정할 것이다[16][17].\n\n## 8. 워치리스트\n\n먼저 7월 6~9일 파리 꾸튀르에서 발렌시아가(피촐리, 7/8)·펜디(치우리, 7/9)·샤넬(블라지) 데뷔 반응을 주시한다. 케링 자매 브랜드인 발렌시아가에 대한 평가가 뎀나 방법론을 대리 채점하기 때문이다. 이어 7월 29일 케링 상반기 실적에서는 구찌 2분기 매출, 지역별 추세, 프리마베라 초기 기여가 턴어라운드 신뢰의 실질 근거가 된다. EU GMAI 경고 밴드가 20.14에서 반등할지 추가 악화할지, 서유럽 심리와 매출 진앙이 동조하는지도 지속 관찰 대상이다. 주얼리 카테고리 모멘텀 역시 스위스 시계 5월 수출 보합(+0.4%)·리슈몽 마진과 대비하며 구찌 하이주얼리 140점의 초기 반응과 VIC 전환을 확인해야 한다. 구찌 뷰티 과도기에서는 Coty 소송 진행과 이관 전 마케팅 연속성, 라반느·톰포드 남성 향수 공세의 강도를 살핀다. 마지막으로 채널 재편에서는 삭스 매장 49개 축소 후 미국 도매 구조와 구찌 직영·면세/공항 채널 상품 구성 대응을 지켜본다.\n\n한편 데이터 주석으로, EU 감성 0.0044·NSS -0.9912는 표본 내 부정 강도가 지배하는 신호이며 매출 확정치가 아니다. 초기 운영기의 Buzz·Engagement는 baseline 축적 전이므로 0.5 기준선을 유지하고 있으며, 지수 원천은 인덱스 파일이다[1]. 이번 스냅샷부터 SOV는 구찌 표적 수집 편향을 배제한 대칭 검색 기반 객관 집계로 산출되며, 그 결과 종전 0.45~0.64가 0.12~0.17로 정상화되었다[18].\n\n## Executive Summary (English)\n\nLuxury's center of gravity is shifting toward a Paris couture generational handover and the structural strength of jewelry, the US, and experiences — a backdrop against which Gucci must clear two simultaneous tests: converting Demna's Primavera into July sales and Kering's July 29 earnings. During couture week (July 6–9), Piccioli's Balenciaga debut (7/8) becomes a proxy scorecard for the post-Demna Gucci narrative across two Kering houses. Kering's Q1 group revenue fell -6% (€3.57bn) while Gucci alone dropped -14%, confirming that the decline is Gucci-specific rather than purely macro, making its recovery the group's top agenda. Bain-Altagamma sees 2026 personal luxury growing 2–4% with jewelry strongest and the US leading growth for the first time since 2021, so Gucci's roughly 140-piece high jewelry launch is well-timed against a soft-luxury slump. Beauty carries a dual risk: the L'Oréal transfer is set for 2028 after the Coty contract expires, while an unresolved Coty UK lawsuit puts about $600M in annual Gucci retail revenue at risk. The EU GMAI has dropped to an alert 20.14 (NSS -0.9912, sentiment 0.0044), revealing a gap between European event buzz and deteriorating regional sentiment. This snapshot replaces the SOV counts with objective symmetric share-of-voice counts across an eight-brand field, so the previously inflated figures (0.45–0.64, biased by Gucci-targeted collection) normalize to 0.12–0.17, showing Gucci at parity with peers — tied for #1 with Chanel in NEA and in the second tier elsewhere — which is the main driver pulling the index down. Overall the global GMAI now sits at a caution (주의) 38.01, with SOV across regions ranging from 0.129 (NA) to 0.171 (NEA). The caution-band index leaves limited room before further deterioration, with the Balenciaga debut and Kering earnings set to confirm the upside or downside direction.\n\n## 주석\n\n- GMAI: 지역별 브랜드 매력도를 0~100으로 나타내는 종합 지수. 산식은 100 × (0.45·감정 + 0.20·Buzz + 0.15·Engagement + 0.20·SOV)로, 감정에 최고 가중을 둬 자극적 화제가 지수를 부풀리지 못하게 한다. 글로벌 값은 지역별 지수를 가중치(NEA 0.35·EU 0.28·NA 0.25·SEA 0.12)로 합산한다.\n- NSS(순감정점수): 개별 항목의 긍정(+1)·중립(0)·부정(-1)에 강도(0.5 또는 1.0)와 가중치를 곱해 합산한 -1~+1 척도. +1이 완전 긍정, -1이 완전 부정이다.\n- 감성 성분: NSS를 0~1로 옮긴 값((NSS+1)/2). GMAI에서 가중 0.45로 가장 크다.\n- Buzz 성분: 오늘 언급량을 30일 평균과 비교한 0~1 값. 기준선 축적 전(5일 미만)에는 판단을 유보해 0.5로 고정한다.\n- 참여(Engagement) 성분: 좋아요·댓글·공유 등 상호작용 깊이를 0~1로 환산한 값. 뉴스처럼 도달·참여 지표가 미상이면 0.5로 둔다.\n- 점유(SOV, Share of Voice) 성분: 8개 럭셔리 브랜드(구찌+경쟁 7개) 대비 구찌 언급 비중을 0~1로 나타낸다. 8개 균등이면 0.125이며, 이번 스냅샷은 대칭 검색 기반 객관 집계를 사용한다.\n- 판정 밴드(5단계): 75~100 강한 매력 · 60~74 우호 · 45~59 중립 · 30~44 주의 · 0~29 경고.\n- Δ(전일대비): 직전 영업일 대비 지수 변화폭. 비교할 직전 인덱스 행이 없으면 null로 표기한다.\n\n## 출처\n\n[1] GMAI 인덱스 파일 — 2026-07-03 지역별 지수·감정·SOV 원천 — data/index/2026-07-03.json\n[2] Wallpaper* — 오트꾸튀르 위크 AW 2026 일정 — https://www.wallpaper.com/fashion-beauty/fashion-beauty-events/haute-couture-week-aw-2026-what-to-expect-schedule\n[3] Runway Live — 발렌시아가 꾸튀르 2026 피촐리 파리 데뷔 — https://www.runwaylive.com/balenciaga-couture-2026-piccioli-paris-haute-couture.html\n[4] Wanted in Rome — 펜디, 로마 국립현대미술관 꾸튀르 — https://www.wantedinrome.com/news/fendi-takes-couture-to-national-modern-art-gallery-in-rome.html\n[5] Investing.com — 케링 1분기 2026 매출, 주얼리가 구찌 부진 상쇄 -to-wear-collection-1238633113/\n[18] SOV 대칭 집계 파일 — 8개 브랜드 대칭 검색 기반 객관 언급 집계(method: symmetric-neutral-queries-7d) — data/sov/2026-07-03.json\n\n<!-- ===== ENGLISH EDITION ===== -->\n\n# Luxury Daily Brief — Paris Couture's Generational Handover and Gucci's Dual Test\n\n2026-07-03 / Period: 2026-07-03 single snapshot / GUCCI INTELLIGENCE\n\n## Table of Contents\n\n1. Today's GMAI Status\n2. Paris Couture's Generational Handover — Balenciaga as a Proxy Scorecard\n3. Kering Internal Dynamics — Gucci Alone at -14%, July 29 Watershed\n4. Structural Advantage of Jewelry, Experiences, and the US\n5. Gucci Beauty License Dual Risk\n6. EU GMAI Alert — Divergence Between Event Buzz and Regional Sentiment\n7. Reading Gucci's Positioning (GMAI/SOV Connection)\n8. Watchlist\n\n## Key Summary\n\nBalenciaga's and Fendi's couture debuts during Paris Couture Week (July 6–9) are setting up a proxy-scorecard structure for Kering and Gucci's narrative, with the reception of Demna's ten-year Balenciaga chapter naturally invited into a symmetric comparison with the post-Demna Gucci story. Against a backdrop where jewelry, experiences, and the US hold structural advantages, Gucci's unveiling of approximately 140 high-jewelry pieces is well-timed, but soft luxury weakness and beauty-transition risk remain shadows on the horizon. This snapshot replaces the SOV (share-of-voice) aggregation from Gucci-targeted collection bias to an objective eight-brand symmetric search-based aggregation; as a result, the previously inflated 0.45–0.64 has normalized to 0.12–0.17 (Gucci at parity with peers), pulling every regional index down. A global GMAI Caution of 38.01 signals that the road to recovery is long, and Kering's July 29 earnings are expected to serve as the watershed confirming the upside or downside direction.\n\n## 1. Today's GMAI Status\n\nThe global GMAI stands at a Caution of 38.01. By region: SEA 54.41 Neutral, NEA 43.41 Caution, NA 42.59 Caution, EU 20.14 Alert. The trigger is EU entering the Alert band. This snapshot replaces the SOV aggregation with an objective symmetric search-based aggregation, normalizing the prior biased figure of 0.45–0.64 to 0.12–0.17 (SEA 0.1579, NEA 0.1707, NA 0.129, EU 0.122) and pulling every regional index down. This report is a third-party synthesis of observed data; all judgments are grounded in the input files, and claims where causality is uncertain are marked as (hypothesis) [1].\n\n## 2. Paris Couture's Generational Handover — Balenciaga as a Proxy Scorecard\n\nDuring Paris Couture Week (July 6–9), Piccioli's Balenciaga couture debut (7/8), Chiuri's Fendi Rome couture (7/9), and second couture outings for Blazy's Chanel and Anderson's Dior are all concentrated in a single calendar window [2][3][4]. The significance is that Balenciaga is the house Demna led for ten years. The reception of post-Demna Balenciaga naturally invites a symmetric comparison with the post-Demna Gucci narrative, forming a dual-scorecard structure across two Kering houses.\n\nLooking at implications: the gain is that houses such as Balenciaga under Piccioli and Fendi under Chiuri, by entering couture, reinforce pinnacle positioning. The risk is that Gucci, without a couture service, exposes the absence of a relative elevation mechanism; and if Balenciaga receives poor reviews, questions about the Demna methodology as a whole could spread (hypothesis). The Gucci takeaway: monitor the reaction to Balenciaga's debut on July 6–9 as a leading indicator for the Gucci Primavera narrative, and proactively frame the logic of substituting the absence of couture with the 140-piece high-jewelry collection and a Florence heritage narrative.\n\n## 3. Kering Internal Dynamics — Gucci Alone at -14%, July 29 Watershed\n\nKering Group Q1 revenue was -6% (€3.57bn), with Saint Laurent, Bottega Veneta, and Balenciaga growing while Gucci alone posted -14%. CEO de Meo's ReconKering plan calls for closing more than 250 stores by 2030 and resets at the brand level, with the next earnings due July 29 [5][6][7]. The contrast between growing sister brands and Gucci's double-digit decline confirms in numbers that the cause of the decline is not purely macro but also Gucci-specific. The logic of resource allocation therefore fixes Gucci's recovery as the top-priority group agenda.\n\nOn implications: the gain belongs to Saint Laurent and Bottega Veneta, which have priority claim on resources and attention. The risk belongs to Gucci, which faces investment-return pressure until it demonstrates recovery. De Meo's store-closure posture may translate into pressure to restructure Gucci's owned-door, full-price channel and reduce total door count (hypothesis). The Gucci takeaway: at the July 29 earnings, early Primavera sales and Q2 regional figures — particularly whether North American improvement continues — become the substantive basis for turnaround credibility. Until then, expectations should be managed with a frame of decelerating decline and qualitative improvement rather than an outright revenue rebound.\n\n## 4. Structural Advantage of Jewelry, Experiences, and the US\n\nThe Bain-Altagamma mid-year update projects 2026 personal luxury growing 2–4%, with experiential spending (travel, dining) leading at 3–7%, jewelry as the strongest category, and the US leading growth for the first time since 2021. Richemont Jewelry posted FY2026 revenue +14% with operating margin of 30.5%, and Gucci is set to unveil approximately 140 high-jewelry pieces across four families to coincide with couture week [8][9][10]. The significance is that Gucci's core leather goods are struggling while jewelry commands structural advantages in price-increase acceptance and self-purchase demand. Moving the product mix away from soft luxury and toward hard luxury is aligned with market direction. However, competing high-jewelry offensives from Tiffany (large Rodeo and Costa Mesa flagships), Van Cleef (180-piece Egypt collection), and Bulgari (65-piece convertible) are also underway simultaneously.\n\nOn implications: the gain belongs to groups with jewelry margin advantages (Richemont, LVMH Jewelry). The risk is that bag-centric groups (including Kering) face structurally exposed margin disadvantages. The shift to US-led growth creates pressure to expand the direct-retail share while the wholesale channel is being restructured through Saks's bankruptcy exit and the closure of 49 stores (hypothesis). The Gucci takeaway: the 140-piece high-jewelry collection is optimally timed. The key to the VIC push is systematizing the celebrity ambassador framework (Bulgari and Tiffany as benchmarks) and designing a sequenced regional launch. North American direct-retail and boutique-experience investment should be elevated in priority in line with the US growth inflection.\n\n## 5. Gucci Beauty License Dual Risk\n\nL'Oreal has completed its acquisition of Kering Beaute for €4.6bn, securing 50-year licenses for Balenciaga and Bottega Veneta fragrances. Gucci Beauty is scheduled to transfer to L'Oreal after the Coty contract expires in 2028. Simultaneously, a Coty lawsuit in the UK High Court of Justice is pending, carrying a risk of approximately $600M in annual Gucci retail revenue [11][12]. The significance is that L'Oreal Luxe, which is driving above-market growth by treating fragrance as a growth engine (Prada, YSL, Valentino, etc.), creates substantial upside for Gucci fragrance post-transfer, but during the pre-transfer transition period (current Coty, pending lawsuit), there is a risk that product launch and marketing continuity will be disrupted. L'Oreal's partnership with OpenAI, which has secured the ChatGPT product-recommendation channel, also raises concerns about smaller licensed brands falling further behind in the discovery competition (hypothesis).\n\nOn implications: the gain belongs to L'Oreal Luxe, which will hold the long-term Gucci fragrance portfolio. The risk belongs to Gucci Beauty in a transitional period of ess.\n\nThe important SOV change in this snapshot is that switching to the eight-brand symmetric search-based objective aggregation (data/sov/2026-07-03.json) removes the Gucci-targeted collection inflation of 0.45–0.64 and reveals that Gucci's share of mentions is at parity with peers [18]. In NEA, Gucci is tied for first with Chanel (7 items each); in SEA, NA, and EU, Gucci is in the second tier immediately below the leading brand in each region — specifically, SEA: Louis Vuitton 4 items vs. Gucci 3 (tied for second with Bottega and Balenciaga); NA: Bottega 5 items vs. Gucci 4 (tied for second with multiple brands); EU: Louis Vuitton 6 items vs. Gucci 5 (tied for second with the remaining six brands). In other words, Gucci does not dominate the conversation in any region; it is at parity with peers in share of voice, and this normalization is the principal driver of the index decline. K-pop ambassadors (aespa's Ningning), the JD.com flagship, and tennis marketing (Sabalenka, Sinner) are operating in a coherent way to maintain NEA/SEA buzz, but under the symmetric aggregation they have not yet converted to an advantage above peer parity [13][14][15].\n\nThe relative position can be summarized as follows: event narrative (Primavera July launch, high jewelry, WWD gallery) is active, but revenue conversion, European sentiment, and share-of-voice advantage remain unverified. The Caution band index leaves limited room before further deterioration. The Balenciaga couture debut (7/8) and Kering earnings (7/29) will confirm the upside or downside direction [16][17].\n\n## 8. Watchlist\n\nFirst, watch the reception to Balenciaga (Piccioli, 7/8), Fendi (Chiuri, 7/9), and Chanel (Blazy) debuts at Paris Couture Week (July 6–9), as Balenciaga's scoring will serve as a proxy scorecard for the Demna methodology. Next, at Kering's H1 earnings on July 29, Gucci's Q2 revenue, regional trends, and early Primavera contribution will become the substantive basis for turnaround credibility. Whether the EU GMAI Alert band rebounds from 20.14 or worsens further, and whether Western European sentiment and revenue trajectories move in sync, are also ongoing subjects of observation. For jewelry category momentum, compare Swiss watch May exports (flat, +0.4%) and Richemont margins against the early reception for Gucci's 140-piece high-jewelry launch and VIC conversion. For Gucci Beauty in transition, monitor the Coty lawsuit proceedings, pre-transfer marketing continuity, and the intensity of Paco Rabanne and Tom Ford men's fragrance offensives. Finally, for channel restructuring, watch how Gucci's owned-door and duty-free/airport channel merchandise mix adapts following the reduction of 49 Saks stores and the reconfiguration of the US wholesale structure.\n\nOn data notes: EU sentiment 0.0044 and NSS -0.9912 are signals that negative intensity within the sample dominates — not confirmed sales figures. In the early operational period, Buzz and Engagement are held at the 0.5 baseline because the baseline has not yet accumulated, and the index source is the index file [1]. Beginning with this snapshot, SOV is calculated using symmetric search-based objective aggregation that excludes the Gucci-targeted collection bias, with the result that the prior 0.45–0.64 has normalized to 0.12–0.17 [18].\n\n## Executive Summary\n\nLuxury's center of gravity is shifting toward a Paris couture generational handover and the structural strength of jewelry, the US, and experiences — a backdrop against which Gucci must clear two simultaneous tests: converting Demna's Primavera into July sales and Kering's July 29 earnings. During couture week (July 6–9), Piccioli's Balenciaga debut (7/8) becomes a proxy scorecard for the post-Demna Gucci narrative across two Kering houses. Kering's Q1 group revenue fell -6% (€3.57bn) while Gucci alone dropped -14%, confirming that the decline is Gucci-specific rather than purely macro, making its recovery the group's top agenda. Bain-Altagamma sees 2026 personal luxury growing 2–4% with jewelry strongest and the US leading growth for the first time since 2021, so Gucci's roughly 140-piece high jewelry launch is well-timed against a soft-luxury slump. Beauty carries a dual risk: the L'Oreal transfer is set for 2028 after the Coty contract expires, while an unresolved Coty UK lawsuit puts about $600M in annual Gucci retail revenue at risk. The EU GMAI has dropped to an Alert 20.14 (NSS -0.9912, sentiment 0.0044), revealing a gap between European event buzz and deteriorating regional sentiment. This snapshot replaces the SOV counts with objective symmetric share-of-voice counts across an eight-brand field, so the previously inflated figures (0.45–0.64, biased by Gucci-targeted collection) normalize to 0.12–0.17, showing Gucci at parity with peers — tied for #1 with Chanel in NEA and in the second tier elsewhere — which is the main driver pulling the index down. Overall the global GMAI now sits at a Caution 38.01, with SOV across regions ranging from 0.129 (NA) to 0.171 (NEA). The caution-band index leaves limited room before further deterioration, with the Balenciaga debut and Kering earnings set to confirm the upside or downside direction.\n\n## Notes\n\n- GMAI: A composite index expressing brand attractiveness by region on a scale of 0–100. The formula is 100 × (0.45 × sentiment + 0.20 × Buzz + 0.15 × Engagement + 0.20 × SOV), with the highest weight assigned to sentiment to prevent sensational buzz from inflating the index. The global value is the weighted sum of regional indices (NEA 0.35 / EU 0.28 / NA 0.25 / SEA 0.12).\n- NSS (Net Sentiment Score): A -1 to +1 scale derived by multiplying each item's positive (+1) / neutral (0) / negative (-1) label by intensity (0.5 or 1.0) and a weighting factor and summing. +1 is fully positive; -1 is fully negative.\n- Sentiment component: NSS mapped to a 0–1 scale ((NSS + 1) / 2). Carries the highest weight of 0.45 in GMAI.\n- Buzz component: A 0–1 value comparing today's mention volume against the 30-day average. Held at 0.5 as neutral pending baseline accumulation (fewer than 5 days).\n- Engagement component: A 0–1 value representing the depth of interaction (likes, comments, shares). Set to 0.5 for news items where reach and engagement metrics are unknown.\n- SOV (Share of Voice) component: Gucci's share of mentions relative to eight luxury brands (Gucci + 7 competitors), expressed as 0–1. An equal share across eight brands equals 0.125. This snapshot uses symmetric search-based objective aggregation.\n- Rating bands (5 levels): 75–100 Strong / 60–74 Favorable / 45–59 Neutral / 30–44 Caution / 0–29 Alert.\n- Delta (day-over-day): The change in the index from the prior business day. Shown as null when no prior index row is available for comparison.\n\n## Sources\n\n[1] GMAI Index File — 2026-07-03 regional index, sentiment, and SOV source — data/index/2026-07-03.json\n[2] Wallpaper* — Haute Couture Week AW 2026 schedule — https://www.wallpaper.com/fashion-beauty/fashion-beauty-events/haute-couture-week-aw-2026-what-to-expect-schedule\n[3] Runway Live — Balenciaga Couture 2026: Piccioli's Paris debut — https://www.runwaylive.com/balenciaga-couture-2026-piccioli-paris-haute-couture.html\n[4] Wanted in Rome — Fendi takes couture to National Modern Art Gallery in Rome — https://www.wantedinrome.com/news/fendi-takes-couture-to-national-modern-art-gallery-in-rome.html\n[5] Investing.com — Kering Q1 2026 revenue: jewelry offsets Gucci drag — https://uk.investing.com/news/company-news/kering-q1-2026-slides-revenue-stabilizes-as-jewelry-offsets-gucci-drag-93CH-4607797\n[6] NSS Magazine — ReconKering: Luca de Meo's Gucci turnaround strategy — https://www.nssmag.com/en/fashion/44996/reconkering-luca-de-meo-gucci-turnaround-kering-strategy\n[7] WWD — Kering Q1 2026 share price and Gucci results — https://wwd.com/business-news/financial/kering-share-price-q1-2026-gucci-1238916304/\n[8] Bain & Company — 2026 global luxury stabilizati const t = () => STR[LANG];

function setLang(l){
  LANG=l; localStorage.setItem('gi-lang', l);
  applyChrome(); refreshAll(); renderGuide();
  if(curTab==='rep' && curReport) openReport(curReport);
}
function applyChrome(){
  $('lang-ko').classList.toggle('on', LANG==='ko');
  $('lang-en').classList.toggle('on', LANG==='en');
  $('btnRefresh').textContent=t().refresh;
  for(const k of ['dash','sp','news','lux','ev','prod','cal','amb','rep','guide','run']) $('tab-'+k).textContent=t().tabs[k];
  $('gmaiNote').textContent=t().gmaiNote;
  $('footOwner').innerHTML=t().footOwner;
  $('trigTitle').textContent=t().trig; $('chartTitle').textContent=t().chart; $('gapTitle').textContent=t().gap;
  $('sovTitle').textContent=t().sov; $('mixTitle').textContent=t().mix; $('prevTitle').textContent=t().prev;
  $('dashEmpty').innerHTML=t().dashEmpty+`<br><span class="go" onclick="showTab('run')">${t().goRun}</span>`;
  $('evName').placeholder=t().evPh; $('btnFlash').textContent=t().btnFlash; $('btnSpecial').textContent=t().btnSpecial;
  $('btnGo').textContent=t().go; $('btnCancel').textContent=t().cancel;
  $('authBar').innerHTML=t().authBar;
  if(!$('runlog').textContent.trim()) $('runlog').textContent=t().logPh;
  $('runBtns').innerHTML=t().runDefs.map(([c,name,desc])=>
    `<button class="runbtn" onclick="runCmd('${c}')"><b>${name}</b><span>${desc}</span></button>`).join('');
  $('repview').innerHTML=`<div class="empty">${t().pickRep}</div>`;
}
function showTab(tb){
  curTab=tb;
  for(const x of ['dash','sp','news','lux','ev','prod','cal','amb','rep','guide','run']){
    $('view-'+x).classList.toggle('hidden', x!==tb);
    $('tab-'+x).classList.toggle('on', x===tb);
  }
  if(tb==='rep') loadReports();
  if(tb==='sp') loadSpecial();
  if(tb==='news') loadNews();
  if(tb==='lux') loadLux();
  if(tb==='ev') loadEvents();
  if(tb==='prod') loadProd();
  if(tb==='cal') loadCal();
  if(tb==='amb') loadAmb();
  if(tb==='guide') renderGuide();
  if(tb==='run') pollRun();
}
// relative fetches so the app works both at / (local) and under /gucci/ (public funnel)
async function jget(u){ const k=u.replace(/^\//,''); if(Object.prototype.hasOwnProperty.call(window.__EMBED,k)) return JSON.parse(JSON.stringify(window.__EMBED[k])); return {error:'cloud mirror: endpoint not captured'}; }
// One report = one file (KO first, EN after the marker); the CLIENT picks the
// language, so the same code works on the live server and on static hosting.
async function getReport(p){
  const d=await jget('api/report/'+p);
  if(d.error) return d;
  const M='<!-- ===== ENGLISH EDITION ===== -->';
  let c=d.content||'';
  if(c.includes(M)){ const parts=c.split(M); c=(LANG==='en'&&parts[1].trim())?parts[1].trim():parts[0].trim(); }
  return {content:c};
}
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function bandCls(b){ return 'b-'+(b||'').replace(/\s/g,''); }
function bandKo2Lang(b){ return t().bands[b]||b; }
function fmtDelta(d){
  if(d===null||d===undefined||d==='') return t().deltaNone;
  const n=+d, cls=n>0?'up':(n<0?'down':'');
  return `${t().delta}<span class="${cls}">${n>0?'+':''}${n.toFixed(2)}</span>`;
}

/* ---------- dashboard ---------- */
async function loadDash(){
  const s = await jget('/api/summary');
  if(!s.has_data){
    $('dashEmpty').classList.remove('hidden'); $('dashBody').classList.add('hidden');
    $('hdrDate').textContent=t().noData;
    return;
  }
  $('dashEmpty').classList.add('hidden'); $('dashBody').classList.remove('hidden');
  $('hdrDate').textContent = s.date + t().asof + s.snapshot_count + t().days;
  let html = globalCard(s.global);
  for(const r of ['NEA','SEA','NA','EU']){
    const d = s.regions[r];
    html += d ? card(t().regions[r], d.GMAI, d.band, d.delta, d.components)
              : `<div class="card"><h3>${t().regions[r]}</h3><div class="num" style="color:var(--ink-dim)">—</div></div>`;
  }
  $('cards').innerHTML = html;
  const v2 = s.triggers_v2;
  const trigLines = (v2 && v2.length) ? v2.map(g=>{
    if(g.code==='band_alert') return t().trigT.band_alert(t().regions[g.region]||g.region, g.gmai);
    if(g.code==='region_drop') return t().trigT.region_drop(t().regions[g.region]||g.region, g.delta);
    if(g.code==='global_delta') return t().trigT.global_delta(g.delta);
    return '';
  }).filter(Boolean) : (s.triggers||[]).map(x=>esc(x));
  $('trigPanel').classList.toggle('hidden', trigLines.length===0);
  $('trigList').innerHTML = trigLines.map(x=>`<div class="trigger">⚠ ${x}${t().trigTail}</div>`).join('');
  drawChart((await jget('/api/timeseries')).rows);
  renderGap(s); loadSov(); loadMix(s); loadPrevs();
}
function renderGap(s){
  const regs=['NEA','SEA','NA','EU'].filter(r=>s.regions[r]&&s.regions[r].contrib);
  if(!regs.length){ $('gapBox').innerHTML=''; return; }
  const g=s.global.GMAI;
  const cols=t().gapCols;
  let h=`<table class="gt"><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>`;
  for(const r of regs){
    const d=s.regions[r], c=d.contrib;
    const diff=(d.GMAI-g);
    // find dominant gap driver: component contribution furthest from the
    // cross-region average of that component
    const avg={}; for(const k of ['sentiment','buzz','engagement','sov'])
      avg[k]=regs.reduce((a,q)=>a+s.regions[q].contrib[k],0)/regs.length;
    let drv='sentiment', best=0;
    for(const k of ['sentiment','buzz','engagement','sov']){
      const dv=Math.abs(c[k]-avg[k]); if(dv>best){best=dv;drv=k;}
    }
    h+=`<tr><td>${t().regions[r]}</td>
      <td style="${drv==='sentiment'?'color:var(--gold)':''}">${c.sentiment.toFixed(1)}p</td>
      <td style="${drv==='buzz'?'color:var(--gold)':''}">${c.buzz.toFixed(1)}p</td>
      <td style="${drv==='engagement'?'color:var(--gold)':''}">${c.engagement.toFixed(1)}p</td>
      <td style="${drv==='sov'?'color:var(--gold)':''}">${c.sov.toFixed(1)}p</td>
      <td><b style="font-weight:550">${d.GMAI.toFixed(1)}</b> <span class="band ${bandCls(d.band)}" style="margin-left:4px">${bandKo2Lang(d.band)}</span></td>
      <td style="color:${diff>=0?'var(--green)':'var(--red)'}">${diff>=0?'+':''}${diff.toFixed(1)} (${t().gapDrv[drv]})</td></tr>`;
  }
  h+=`</table><div class="note">${t().gapNote}</div>`;
  $('gapBox').innerHTML=h;
}
function gaugeSvg(v, band){
  const col = BAND_COLORS[band]||'#c9a24b';
  const a0=Math.PI, a1=Math.PI*(1-v/100);
  const cx=52,cy=50,R=40;
  const x1=cx+R*Math.cos(a0), y1=cy-R*Math.sin(a0);
  const x2=cx+R*Math.cos(a1), y2=cy-R*Math.sin(a1);
  const large=(v>50)?1:0;
  return `<svg class="gauge" width="104" height="58" viewBox="0 0 104 58">
    <path d="M ${x1} ${y1} A ${R} ${R} 0 0 1 ${cx+R} ${cy}" fill="none" stroke="#2e2a24" stroke-width="8" stroke-linecap="round"/>
    <path d="M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="8" stroke-linecap="round"/>
  </svg>`;
}
function globalCard(g){
  return `<div class="card"><h3>${t().regions.GLOBAL}</h3>${gaugeSvg(g.GMAI, g.band)}
    <div class="big">${g.GMAI.toFixed(1)}<span class="band ${bandCls(g.band)}">${bandKo2Lang(g.band)}</span></div>
    <div class="delta">${fmtDelta(g.delta)}</div></div>`;
}
function card(name, gmai, band, delta, comps){
  let c='';
  if(comps){
    const rows=[[t().comps.sent,comps.sentiment],[t().comps.buzz,comps.buzz],[t().comps.eng,comps.engagement],[t().comps.sov,comps.sov]];
    c='<div class="comp">'+rows.map(([k,v])=>
      `<div class="row"><span>${k}</span><div class="bar"><i style="width:${Math.round(v*100)}%"></i></div><span>${(v*100).toFixed(0)}</span></div>`).join('')+'</div>';
  }
  return `<div class="card"><h3>${name}</h3>
    <div class="num">${gmai.toFixed(1)}<span class="band ${bandCls(band)}">${bandKo2Lang(band)}</span></div>
    <div class="delta">${fmtDelta(delta)}</div>${c}</div>`;
}

  const d = await jget('/api/sov');
  sovData=d;
  if(!d.has_data){ $('sovBox').innerHTML=`<div class="empty">${t().noSov}</div>`; return; }

  let h = entries.map(([nm,v])=>
    `<div class="sovrow ${nm==='Gucci'?'gucci':''}"><span class="nm">${esc(nm)}</span>
     <div class="bar"><i style="width:${Math.round(v/max*100)}%"></i></div>
     <span class="v">${(v/total*100).toFixed(1)}%</span></div>`).join('')
    + `<div class="note">${t().sovNote(d.date,total)} · ${t().sovSrc[d.source]||''}`
    + (d.source==='objective'?` · <span style="color:var(--gold);cursor:pointer" onclick="sovEvOpen=!sovEvOpen;renderSov()">${sovEvOpen?t().sovEvHide:t().sovEvBtn}</span>`:'')
    + `</div>`;
  if(sovEvOpen && d.source==='objective'){

/* ---------- chart ---------- */
function drawChart(rows){
  const W=1080,H=260,P={l:34,r:10,t:10,b:24};
  const dates=[...new Set(rows.map(r=>r.date))].sort();
  if(dates.length===0){ $('chart').innerHTML=`<div class="empty">${t().noTs}</div>`; return; }
  const x=i=>dates.length<2 ? (P.l+W-P.r)/2 : P.l+(W-P.l-P.r)*i/(dates.length-1);
  const y=v=>P.t+(H-P.t-P.b)*(1-v/100);
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">`;
  const zones=[[75,100,'#1d4d33'],[60,75,'#22392c'],[45,60,'#2b2820'],[30,45,'#39301e'],[0,30,'#3a2020']];
  for(const [a,b,col] of zones)
    svg+=`<rect x="${P.l}" y="${y(b)}" width="${W-P.l-P.r}" height="${y(a)-y(b)}" fill="${col}" opacity="0.35"/>`;
  for(const g of [0,25,50,75,100])
    svg+=`<line x1="${P.l}" y1="${y(g)}" x2="${W-P.r}" y2="${y(g)}" stroke="#2e2a24"/><text x="4" y="${y(g)+4}" fill="#9a927f" font-size="10">${g}</text>`;
  for(const reg of ['NEA','SEA','NA','EU','GLOBAL']){
    const pts=dates.map((d,i)=>{const r=rows.find(q=>q.date===d&&q.region===reg);return r?[x(i),y(r.GMAI)]:null;}).filter(Boolean);
    if(!pts.length) continue;
    const w=reg==='GLOBAL'?3:1.5, o=reg==='GLOBAL'?1:0.75;
    svg+=`<polyline points="${pts.map(p=>p.join(',')).join(' ')}" fill="none" stroke="${LINE_COLORS[reg]}" stroke-width="${w}" opacity="${o}"/>`;
    for(const p of pts) svg+=`<circle cx="${p[0]}" cy="${p[1]}" r="${reg==='GLOBAL'?3:2}" fill="${LINE_COLORS[reg]}"/>`;
  }
  const step=Math.max(1,Math.ceil(dates.length/12));
  dates.forEach((d,i)=>{ if(i%step===0||i===dates.length-1)
    svg+=`<text x="${x(i)}" y="${H-6}" fill="#9a927f" font-size="10" text-anchor="middle">${d.slice(5)}</text>`;});
  svg+='</svg>';
  $('chart').innerHTML=svg;
  $('legend').innerHTML=['GLOBAL','NEA','SEA','NA','EU'].map(r=>
    `<span><i style="background:${LINE_COLORS[r]}"></i>${t().regions[r]}</span>`).join('');
}

function dday(ds){
  if(!ds) return '';
  const d0=new Date((''+ds).slice(0,10)), now=new Date();
  const diff=Math.ceil((d0-new Date(now.getFullYear(),now.getMonth(),now.getDate()))/86400000);
  return diff===0?'-DAY':(diff>0?'-'+diff:'+'+(-diff));
}

/* ---------- reports ---------- */
async function loadReports(){
  const d=await jget('/api/reports');
  d.reports=d.reports.filter(r=>r.category==='daily'||r.category==='weekly');
  if(!d.reports.length){ $('replist').innerHTML=`<div class="empty">${t().noPrev}</div>`; return; }
  $('replist').innerHTML=d.reports.map(r=>
    `<div class="item ${curReport===r.path?'on':''}" onclick="openReport('${r.path}')">
       <div class="cat">${t().cats[r.category]||r.category}</div>
       <div class="nm">${esc(r.name)}</div><div class="tm">${r.mtime}</div></div>`).join('');
}
async function openReport(p){
  curReport=p;
  const d=await getReport(p);
  $('repview').innerHTML = d.error ? `<div class="empty">${esc(d.error)}</div>` : renderMd(d.content);
  loadReports();
}
function renderMd(text){
  const lines=text.split(/\r?\n/); let out=[],tbl=[],para=[];
  const flushPara=()=>{ if(para.length){ out.push('<p>'+para.join(' ')+'</p>'); para=[]; } };
  const flushTbl=()=>{ if(!tbl.length) return;
    let h='<table>';
    tbl.forEach((cells,i)=>{
      if(cells.every(c=>/^[-: ]+$/.test(c))) return;
      const tag=i===0?'th':'td';
      h+='<tr>'+cells.map(c=>`<${tag}>${linkify(esc(c))}</${tag}>`).join('')+'</tr>';
    });
    out.push('<div class="tblwrap">'+h+'</table></div>'); tbl=[]; };
  for(const raw of lines){
    const tx=raw.trimEnd();
    if(/^\|.*\|$/.test(tx.trim())){ flushPara(); tbl.push(tx.trim().slice(1,-1).split('|').map(s=>s.trim())); continue; }
    flushTbl();
    if(tx.trim()===''){ flushPara(); continue; }
    let m;
    if(m=tx.match(/^#{1,2}\s+(.*)/)){ flushPara(); out.push(`<h1m>${linkify(esc(m[1]))}</h1m>`); continue; }
    if(m=tx.match(/^#{3,6}\s+(.*)/)){ flushPara(); out.push(`<h2m>${linkify(esc(m[1]))}</h2m>`); continue; }
    const s=tx.trim();
    if(s.startsWith('□')||s.startsWith('○')||s.startsWith('·')||/^[-*]\s/.test(s)){
      flushPara();
      const cls = s.startsWith('□')?'l0' : s.startsWith('○')?'l1' : 'l2';
      out.push(`<span class="${cls}">${linkify(esc(s))}</span>`);
    } else {
      para.push(linkify(esc(s)));
    }
  }
  flushPara(); flushTbl();
  return out.join('');
}
function linkify(s){ return s.replace(/(https?:\/\/[^\s<)\]]+)/g,'<a href="$1" target="_blank">$1</a>'); }

/* ---------- run ---------- */
let pendingRun=null, noticeTimer=null;
function notify(msg){
  const n=$('notice'); n.textContent=msg; n.classList.remove('hidden');
  clearTimeout(noticeTimer); noticeTimer=setTimeout(()=>n.classList.add('hidden'), 6000);
}
async function runCmd(cmd,arg){
  const st=await jget('/api/status');
  if(!st.claude_available){ notify(t().noClaude); return; }
  if(st.running){ notify(t().already+(t().cmds[st.cmd]||st.cmd)); return; }
  pendingRun={cmd,arg:arg||''};
  $('confirmMsg').textContent=t().confirm(t().cmds[cmd]||cmd, arg||'');
  $('confirmBar').classList.remove('hidden');
}
function cancelRun(){ pendingRun=null; $('confirmBar').classList.add('hidden'); }
async function confirmRun(){
  if(!pendingRun) return;
  const {cmd,arg}=pendingRun; cancelRun();
  const r=await fetch('api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cmd,arg})});
  const d=await r.json();
  if(d.error) notify(t().failed+d.error); else notify((t().cmds[cmd]||cmd)+t().started);
  pollRun();
}
function runEvent(cmd){
  const v=$('evName').value.trim();
  if(!v){ notify(t().evNeed); return; }
  runCmd(cmd, v);
}
async function pollRun(){
  clearTimeout(pollTimer);
  const st=await jget('/api/status');
  if(st.ui_mtime){ if(uiMtime===null) uiMtime=st.ui_mtime; else if(st.ui_mtime!==uiMtime) location.reload(); }
  if(st.readonly){
    document.body.classList.add('ro');
    if(curTab==='run') showTab('dash');
    pollTimer=setTimeout(pollRun, 60000);
    return;
  }
  const el=$('runstate');
  el.classList.toggle('running', st.running);
  if(st.running){
    $('runtext').textContent=t().running(t().cmds[st.cmd]||st.cmd, st.started);
    $('hdrStatus').textContent=t().hdrRunning;
  }else if(st.cmd){
    $('runtext').textContent=t().done(t().cmds[st.cmd]||st.cmd, st.exit);
    $('hdrStatus').textContent='';
  }else{
    $('runtext').textContent=t().idle; $('hdrStatus').textContent='';
  }
  $('authBar').classList.toggle('hidden', !st.auth_error);
  if(st.auth_error) $('hdrStatus').textContent=t().hdrAuth;
  $('runnote').textContent = st.claude_available ? t().runnoteOk : t().runnoteNo;
  const lg=await jget('/api/runlog');
  if(lg.lines.length){ const box=$('runlog'); box.textContent=lg.lines.join('\n'); box.scrollTop=box.scrollHeight; }
  pollTimer=setTimeout(pollRun, st.running?4000:15000);
}

applyChrome(); renderGuide(); loadDash(); pollRun();

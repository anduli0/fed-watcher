name: Diagnose Render Suspension

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Query service suspension state
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?limit=20" | python3 -c "
          import sys, json
          for it in json.load(sys.stdin):
              s = it['service']
              print(s['name'], '|', s['id'])
              print('  suspended :', s.get('suspended'))
              print('  suspenders:', s.get('suspenders'))
              print('  plan      :', s.get('serviceDetails', {}).get('plan'))
              print()
          "

name: Deploy krw-watcher to Render

on:
  push:
    branches: [main, master]
    paths:
      - 'krw-watcher/**'
      - '.github/workflows/deploy-krw.yml'
  workflow_dispatch:

# Serialize krw-watcher deploys (separate group from the fed-watcher deploy).
concurrency:
  group: render-deploy-krw
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup service, deploy, verify
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          set -e

          echo "=== Render owner ==="
          OWNER_ID=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/owners?limit=1" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['owner']['id'])")
          echo "Owner ID: $OWNER_ID"

          echo "=== Locate krw-watcher service ==="
          SERVICES=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?limit=50")
          SERVICE_ID=$(echo "$SERVICES" | python3 -c "
          import sys, json
          for item in json.load(sys.stdin):
            svc = item.get('service', {})
            if svc.get('name','').lower() == 'krw-watcher':
              print(svc['id']); break
          " 2>/dev/null || true)

          if [ -z "$SERVICE_ID" ]; then
            echo "=== Creating krw-watcher service (Docker, branch ${GITHUB_REF_NAME}) ==="
            CREATE_RESP=$(curl -s -X POST "https://api.render.com/v1/services" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                \"type\": \"web_service\",
                \"name\": \"krw-watcher\",
                \"ownerId\": \"$OWNER_ID\",
                \"repo\": \"https://github.com/anduli0/fed-watcher\",
                \"branch\": \"${GITHUB_REF_NAME}\",
                \"autoDeploy\": \"yes\",
                \"rootDir\": \"krw-watcher\",
                \"serviceDetails\": {
                  \"env\": \"docker\",
                  \"plan\": \"free\",
                  \"region\": \"oregon\",
                  \"healthCheckPath\": \"/health\",
                  \"envSpecificDetails\": {
                    \"dockerfilePath\": \"./Dockerfile\",
                    \"dockerContext\": \".\"
                  }
                }
              }")
            echo "Create response: $CREATE_RESP"
            SERVICE_ID=$(echo "$CREATE_RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          d = d.get('service', d)
          print(d.get('id',''))
          " 2>/dev/null || echo "")
          fi
          echo "Service ID: $SERVICE_ID"
          if [ -z "$SERVICE_ID" ]; then echo "ERROR: no service id"; exit 1; fi

          # rootDir=krw-watcher gives Render's change detection a natural build
          # filter: pushes that don't touch krw-watcher/ don't rebuild this
          # service. Also keep the fed-watcher service from rebuilding on
          # krw-only pushes by giving it an ignoredPaths filter once.
          FED_ID=$(echo "$SERVICES" | python3 -c "
          import sys, json
          for item in json.load(sys.stdin):
            svc = item.get('service', {})
            if 'fed-watcher' in svc.get('name','').lower():
              print(svc['id']); break
          " 2>/dev/null || true)
          if [ -n "$FED_ID" ]; then
            HAS_FILTER=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$FED_ID" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); d=d.get('service',d); print('yes' if (d.get('buildFilter') or {}).get('ignoredPaths') else 'no')" 2>/dev/null || echo "?")
            if [ "$HAS_FILTER" = "no" ]; then
              echo "=== One-time: fed-watcher ignores krw-watcher/** pushes ==="
              curl -s -X PATCH "https://api.render.com/v1/services/$FED_ID" \
                -H "Authorization: Bearer $RENDER_API_KEY" \
                -H "Content-Type: application/json" \
                -d '{"buildFilter":{"paths":[],"ignoredPaths":["krw-watcher/**"]}}' \
                -o /dev/null -w "fed buildFilter PATCH -> HTTP %{http_code}\n"
            fi
          fi

          echo "=== Env vars (non-destructive merge) ==="
          EXISTING_JSON=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID/env-vars?limit=100" || echo '[]')
          ENV_VARS=$(EXISTING_JSON="$EXISTING_JSON" python3 -c "
          import json, os
          existing = {}
          try:
            for item in json.loads(os.environ.get('EXISTING_JSON') or '[]'):
              ev = item.get('envVar', item) if isinstance(item, dict) else {}
              if ev.get('key'):
                existing[ev['key']] = ev.get('value', '')
          except Exception:
            pass
          desired = {
            'CLAUDE_CODE_OAUTH_TOKEN': os.environ.get('CLAUDE_CODE_OAUTH_TOKEN', ''),
            'CLAUDE_CREDENTIALS': os.environ.get('CLAUDE_CREDENTIALS', ''),
            'FRED_API_KEY': os.environ.get('FRED_API_KEY', ''),
          }
          merged = dict(existing)
          for k, v in desired.items():
            if v:
              merged[k] = v
          if merged == existing:
            print('UNCHANGED')
          else:
            print(json.dumps([{'key': k, 'value': v} for k, v in merged.items()]))
          ")
          if [ "$ENV_VARS" = "UNCHANGED" ]; then
            echo "Env vars already up to date -> skipping PUT"
          else
            curl -sf -X PUT \
              "https://api.render.com/v1/services/$SERVICE_ID/env-vars" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$ENV_VARS" -o /dev/null -w "env-vars PUT HTTP %{http_code}\n"
          fi

          echo "=== Service URL ==="
          URL=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('service',d).get('serviceDetails',{}).get('url',''))" 2>/dev/null || echo "")
          echo "URL: $URL"

          # Adopt the webhook-created deploy for this commit; POST one only if
          # the webhook doesn't show up (fresh service, manual dispatch, hiccup).
          NEW_DEPLOY_ID=""
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "=== Waiting for Render's webhook build of $GITHUB_SHA ==="
            for i in $(seq 1 6); do
              LATEST=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
                "https://api.render.com/v1/services/$SERVICE_ID/deploys?limit=1" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); dep=(d[0].get('deploy',d[0]) if d else {}); print(dep.get('id','') + ' ' + dep.get('commit',{}).get('id',''))" 2>/dev/null || echo " ")
              LATEST_ID="${LATEST%% *}"
              LATEST_COMMIT="${LATEST#* }"
              if [ "$LATEST_COMMIT" = "$GITHUB_SHA" ]; then
                NEW_DEPLOY_ID="$LATEST_ID"
                echo "  webhook build found: $NEW_DEPLOY_ID"
                break
              fi
              echo "  [$i] latest deploy is for '$LATEST_COMMIT'; waiting 15s..."
              sleep 15
            done
          fi
          if [ -z "$NEW_DEPLOY_ID" ]; then
            echo "=== Triggering deploy via API ==="
            NEW_DEPLOY_ID=$(curl -s -X POST -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
              -d '{"clearCache":"do_not_clear"}' \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id', d.get('deploy',{}).get('id','')))" 2>/dev/null || echo "")
            echo "New deploy ID: ${NEW_DEPLOY_ID:-'(none — will follow latest)'}"
          fi

          echo "=== Polling deploy status (up to 20 min) ==="
          FINAL_STATUS="unknown"
          for i in $(seq 1 80); do
            sleep 15
            if [ -n "$NEW_DEPLOY_ID" ]; then
              STATUS=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
                "https://api.render.com/v1/services/$SERVICE_ID/deploys/$NEW_DEPLOY_ID" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status', d.get('deploy',{}).get('status','?')))" 2>/dev/null || echo "?")
            else
              STATUS=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
                "https://api.render.com/v1/services/$SERVICE_ID/deploys?limit=1" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print((d[0].get('deploy',d[0])).get('status','?')) if d else print('?')" 2>/dev/null || echo "?")
            fi
            echo "  [$i] status=$STATUS"
            FINAL_STATUS="$STATUS"
            case "$STATUS" in
              live) echo "Deploy live."; break ;;
              build_failed|update_failed|canceled|pre_deploy_failed|deactivated) echo "Deploy failed: $STATUS"; break ;;
            esac
          done

          echo "=== Health & endpoint probes ==="
          HEALTH=""
          for i in $(seq 1 9); do
            HEALTH=$(curl -sf --max-time 15 "$URL/health" 2>/dev/null || echo "")
            if [ -n "$HEALTH" ]; then break; fi
            echo "  [$i] not ready, waiting 10s..."
            sleep 10
          done
          echo "health: ${HEALTH:-OFFLINE}"
          LATEST_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "$URL/api/latest" || echo ERR)
          CHART_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "$URL/api/chart?range=1d" || echo ERR)
          ROOT_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "$URL/" || echo ERR)
          echo "probes: latest=$LATEST_CODE chart=$CHART_CODE root=$ROOT_CODE"

          echo "=== Waiting for first AI analysis (startup warm-up, up to ~8 min) ==="
          ANALYSIS="no_analysis"
          for i in $(seq 1 32); do
            sleep 15
            A=$(curl -sf --max-time 20 "$URL/api/analysis" 2>/dev/null || echo '{}')
            S=$(echo "$A" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status') or ('ok' if d.get('headline') is not None else '?'))" 2>/dev/null || echo "?")
            echo "  [$i] analysis=$S"
            if [ "$S" = "ok" ]; then ANALYSIS="$A"; break; fi
          done

          echo "=== Recent activity ==="
          curl -sf --max-time 20 "$URL/api/activity?limit=25" 2>/dev/null | python3 -c "
          import sys, json
          try:
            for e in json.load(sys.stdin):
              print(f\"  [{e.get('ts','')[:19]}] {e.get('source')}: {e.get('message','')[:100]} [{e.get('status')}]\")
          except Exception as ex:
            print('  (activity unavailable:', ex, ')')
          " || true

          {
            echo "### krw-watcher deploy"
            echo '```'
            echo "SERVICE_ID=$SERVICE_ID"
            echo "URL=$URL"
            echo "DEPLOY_STATUS=$FINAL_STATUS"
            echo "HEALTH=${HEALTH:-OFFLINE}"
            echo "probes: latest=$LATEST_CODE chart=$CHART_CODE root=$ROOT_CODE"
            echo "analysis: $(echo "$ANALYSIS" | head -c 500)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

name: Verify Render Deployment

on:
  workflow_dispatch:

env:
  BASE_URL: https://fed-watcher-backend-9rgk.onrender.com
  SERVICE_ID: srv-d8cjm7pnrd2s73dmg1q0

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check health endpoint
        run: |
          echo "=== Health Check ==="
          RESP=$(curl -sf --max-time 30 "$BASE_URL/health" || echo "FAILED")
          echo "Response: $RESP"

      - name: Check API endpoints
        run: |
          echo ""
          echo "=== /api/forecast ==="
          curl -s --max-time 30 "$BASE_URL/api/forecast" | python3 -m json.tool 2>/dev/null | head -30 || echo "FAILED or empty"

          echo ""
          echo "=== /api/agents/status ==="
          curl -sf --max-time 30 "$BASE_URL/api/agents/status" | python3 -m json.tool 2>/dev/null | head -20 || echo "FAILED or empty"

          echo ""
          echo "=== /api/briefings (latest) ==="
          curl -sf --max-time 30 "$BASE_URL/api/briefings?limit=1" | python3 -m json.tool 2>/dev/null | head -20 || echo "FAILED or empty"

      - name: Recent agent activity
        run: |
          echo "=== /api/activity (last 25 events) ==="
          curl -sf --max-time 30 "$BASE_URL/api/activity" | python3 -c "
          import sys, json
          try:
            events = json.load(sys.stdin)
          except Exception as e:
            print('parse error:', e); raise SystemExit
          for e in events[-25:]:
            agent = e.get('agent') or 'System'
            print(f\"  [{e.get('timestamp','')[:19]}] {agent}: {e.get('message','')[:100]} [{e.get('status','')}]\")
          " || echo "FAILED or empty"

      - name: Check Render deploy status
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo ""
          echo "=== Render Deploy Status ==="
          curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys?limit=3" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for d in data[:3]:
            dep = d.get('deploy', d)
            print(f'  Status: {dep.get(\"status\")} | {dep.get(\"createdAt\", \"\")[:19]}')
            print(f'  Commit: {dep.get(\"commit\",{}).get(\"message\",\"\")}')
            print()
          " || echo "Could not fetch deploy status"

      - name: Summarize results
        run: |
          # Results go to stdout + the run summary; nothing is committed to the
          # repo (Render auto-deploys every push to the tracked branch, so a
          # status commit would rebuild and restart the service).
          HEALTH=$(curl -sf --max-time 20 "$BASE_URL/health" 2>/dev/null || echo 'OFFLINE')
          FORECAST=$(curl -s --max-time 20 "$BASE_URL/api/forecast" 2>/dev/null | head -c 400 || echo 'ERR')
          AGENTS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "$BASE_URL/api/agents/status" 2>/dev/null || echo 'ERR')
          {
            echo "### Render verification"
            echo '```'
            echo "$(date -u): agents_status=$AGENTS"
            echo "health=$HEALTH"
            echo "forecast=$FORECAST"
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

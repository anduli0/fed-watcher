name: Daily Pages Deploy

# Replaces the Render deployment entirely: runs the pipeline directly on the
# Actions runner (scripts/ci_daily.py), snapshots every API response to static
# JSON, builds the Next.js static export, and publishes it to GitHub Pages.
# The SQLite DB is persisted on the `ci-data` branch so forecast history /
# track record accumulate across runs.
#
# Schedule mirrors the old Render scheduler (KST = UTC+9):
#   full AI cycles  00:30 / 05:00 / 12:30 / 16:30 / 20:30 KST
#   daily briefing  07:30 KST
#   market refresh  hourly (no AI tokens — FRED charts, indicators, news)

on:
  schedule:
    - cron: "30 15 * * *"   # 00:30 KST — full cycle
    - cron: "0 20 * * *"    # 05:00 KST — full cycle
    - cron: "30 3 * * *"    # 12:30 KST — full cycle
    - cron: "30 7 * * *"    # 16:30 KST — full cycle
    - cron: "30 11 * * *"   # 20:30 KST — full cycle
    - cron: "30 22 * * *"   # 07:30 KST — briefing
    - cron: "17 * * * *"    # hourly    — market-data refresh (no AI)
  workflow_dispatch:
    inputs:
      mode:
        description: "What to run"
        type: choice
        options: [full, briefing, refresh, export]
        default: full

permissions:
  contents: write   # push ci-data state branch
  pages: write
  id-token: write

concurrency:
  group: pages-daily
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      DEV_MODE: "true"
      ALLOWED_IPS: "*"
      DATABASE_URL: "sqlite+aiosqlite:///${{ github.workspace }}/data/fed_watcher.db"
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MODEL_ID: claude-sonnet-4-6
      # 4-core runner with 16 GB — parallelize the agent fleet (Render free
      # tier forced 1 × 256 MB).
      CLAUDE_MAX_CONCURRENT: "3"
      CLAUDE_NODE_MAX_OLD_SPACE_MB: "1024"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Resolve run mode
        id: mode
        run: |
          case "${{ github.event.schedule }}" in
            "17 * * * *")  MODE=refresh ;;
            "30 22 * * *") MODE=briefing ;;
            "")            MODE="${{ inputs.mode || 'full' }}" ;;
            *)             MODE=full ;;
          esac
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Run mode: $MODE"

      - uses: actions/checkout@v4

      - name: Restore DB from ci-data branch
        run: |
          mkdir -p data
          if git fetch origin ci-data --depth 1 2>/dev/null; then
            if git cat-file -e FETCH_HEAD:fed_watcher.db 2>/dev/null; then
              git show FETCH_HEAD:fed_watcher.db > data/fed_watcher.db
              echo "Restored DB: $(wc -c < data/fed_watcher.db) bytes"
            fi
          else
            echo "No ci-data branch yet — starting with a fresh DB"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Claude CLI
        if: ${{ steps.mode.outputs.mode == 'full' || steps.mode.outputs.mode == 'briefing' }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Run pipeline + export static JSON
        env:
          MODE: ${{ steps.mode.outputs.mode }}
        run: python scripts/ci_daily.py

      - name: Persist DB to ci-data branch
        if: ${{ steps.mode.outputs.mode == 'full' || steps.mode.outputs.mode == 'briefing' }}
        run: |
          set -e
          STATE_DIR=$(mktemp -d)
          cp data/fed_watcher.db "$STATE_DIR/"
          cd "$STATE_DIR"
          git init -b ci-data -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fed_watcher.db
          git commit -q -m "ci state $(date -u +%Y-%m-%dT%H:%MZ)"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" ci-data

      - name: Build static frontend
        working-directory: frontend
        env:
          NEXT_OUTPUT_EXPORT: "true"
          NEXT_PUBLIC_STATIC_DATA: "true"
          NEXT_PUBLIC_BASE_PATH: /fed-watcher
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Mirror Gucci Intelligence

on:
  workflow_dispatch:
  schedule:
    - cron: '47 22,3,8,13 * * *'   # 07:47/12:47/17:47/22:47 KST — lands ~13min before each dashboard refresh
  push:
    branches: [claude/mobile-offline-functionality-h7k7bm]
    paths:
      - '.github/workflows/fetch-gucci.yml'

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/mobile-offline-functionality-h7k7bm

      - name: Fetch site and same-origin assets
        run: |
          set -x
          BASE="https://krw-watcher.tail3e31a9.ts.net"
          OUT="gucci-mirror"
          rm -rf "$OUT"; mkdir -p "$OUT"

          fetch() {  # $1 = absolute path on site, $2 = output file
            mkdir -p "$(dirname "$OUT/$2")"
            curl -sL --max-time 30 -A "Mozilla/5.0 (X11; Linux x86_64) Chrome/126 Safari/537.36" \
              -w "%{http_code} $1\n" -o "$OUT/$2" "$BASE$1" >> "$OUT/_fetch_log.txt" 2>&1 || true
          }

          fetch "/gucci/" "index.html"
          fetch "/gucci" "index_noslash.html"
          fetch "/" "root.html"

          # Discover same-origin links in the main page (src/href/fetch/axios URLs)
          grep -oE '(src|href)="[^"]+"' "$OUT/index.html" | sed -E 's/^(src|href)="//; s/"$//' | sort -u > "$OUT/_links.txt" || true
          grep -oE "(fetch|axios[a-zA-Z.]*)\(['\"][^'\"]+" "$OUT/index.html" | grep -oE "['\"][^'\"]+$" | tr -d "'\"" | sort -u >> "$OUT/_links.txt" || true

          # Fetch up to 40 same-origin assets (js/css/json), keeping paths
          i=0
          while read -r link; do
            case "$link" in
              http*://krw-watcher.tail3e31a9.ts.net/*) p="${link#*.ts.net}" ;;
              http*) continue ;;
              /*) p="$link" ;;
              *) p="/gucci/$link" ;;
            esac
            p="${p%%\?*}"
            [ -z "$p" ] && continue
            i=$((i+1)); [ "$i" -gt 40 ] && break
            fetch "$p" "assets${p}"
          done < "$OUT/_links.txt"

          # Known API endpoints used by the SPA (jget calls in index.html)
          for ep in summary timeseries news luxury events products calendar ambassadors reports sov pool status runlog; do
            fetch "/gucci/api/$ep" "api/$ep.json"
          done

          # Fetch every report listed by /api/reports (list of paths/ids)
          python3 - <<'PY' > "$OUT/_report_paths.txt" || true
          import json
          try:
              d = json.load(open("gucci-mirror/api/reports.json"))
          except Exception:
              d = []
          items = d if isinstance(d, list) else d.get("reports") or d.get("items") or []
          for it in items:
              p = it if isinstance(it, str) else (it.get("path") or it.get("file") or it.get("id") or "")
              if p:
                  print(p)
          PY
          while read -r p; do
            [ -z "$p" ] && continue
            safe=$(echo "$p" | tr '/' '_')
            fetch "/gucci/api/report/$p" "reports/${safe}.json"
          done < "$OUT/_report_paths.txt"

          echo "== fetch log =="; cat "$OUT/_fetch_log.txt" || true
          du -sh "$OUT"

      - name: Commit mirror back to branch (only if the fetch got valid data)
        run: |
          # PC/funnel offline -> curl wrote empty/error files; keep the last good mirror.
          if ! python3 -c "import json,sys; d=json.load(open('gucci-mirror/api/summary.json')); sys.exit(0 if d.get('date') else 1)" 2>/dev/null; then
            echo "summary.json invalid or missing -> source offline, keeping previous mirror"
            git checkout -- gucci-mirror 2>/dev/null || true
            git clean -fd gucci-mirror 2>/dev/null || true
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gucci-mirror
          if git diff --cached --quiet; then
            echo "mirror unchanged"
            exit 0
          fi
          git commit -m "chore: gucci-intelligence site mirror [skip ci]"
          git push origin claude/mobile-offline-functionality-h7k7bm

name: Daily 8AM KST auto-update

# PC 퍼널 사이트(krw-watcher.tail3e31a9.ts.net)의 아침 업데이트 "검증" 워크플로우.
#
# 실측 결과(run #28762195426) 이 사이트의 조작용 POST 엔드포인트(/api/cycle,
# /api/briefing/generate)는 인증으로 보호되어 외부 러너에서는 HTTP 401을
# 반환한다 — 외부에서 사이클을 "기동"하는 것은 불가능하고 필요하지도 않다.
# 사이트는 자체 스케줄러로 매일 아침 사이클을 돌린다(오늘 07:30 KST 완료
# 확인, run.id=108). PC가 꺼져 있다가 켜져도 부팅 warm-up이 스스로 따라잡고,
# 능동 복구가 필요하면 PC 로컬 작업(scheduler/daily_update_krw.ps1)이
# localhost로 수행한다.
#
# 따라서 이 워크플로우는 07:45 KST에 "오늘 아침 예측 + 오늘자 브리핑이
# 존재하는가"만 검증한다. 실패(사이트 오프라인/미갱신)하면 오후까지의 스윕이
# 재검증하고, 08:10 KST Claude 감시견 루틴이 지속 실패를 사용자에게 보고한다.

on:
  schedule:
    - cron: "45 22 * * *"   # 07:45 KST — 본 검증 (내부 07:30 완료 직후)
    - cron: "45 23 * * *"   # 08:45 KST — 재검증
    - cron: "45 1,3,5 * * *" # 10:45, 12:45, 14:45 KST — 재검증 스윕
  workflow_dispatch:
    inputs:
      url:
        description: "Base URL of the krw-watcher site"
        default: "https://krw-watcher.tail3e31a9.ts.net"

concurrency:
  group: daily-update-krw-funnel
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Verify today's morning update exists
        env:
          BASE: ${{ github.event.inputs.url || 'https://krw-watcher.tail3e31a9.ts.net' }}
        run: |
          set -u
          BASE="${BASE%/}"
          TODAY=$(TZ=Asia/Seoul date +%F)
          echo "target=$BASE today(KST)=$TODAY"

          echo "=== 1. Reachability (5 tries, 30s backoff) ==="
          HEALTH=""
          for i in $(seq 1 5); do
            HEALTH=$(curl -sf --max-time 20 "$BASE/health" 2>/dev/null || echo "")
            if [ -n "$HEALTH" ]; then break; fi
            echo "  [$i] unreachable, waiting 30s..."
            sleep 30
          done
          if [ -z "$HEALTH" ]; then
            echo "SITE OFFLINE — 호스트 PC가 꺼져 있을 수 있습니다(정상 상황)."
            echo "PC가 켜지면 앱의 부팅 warm-up과 로컬 작업이 스스로 따라잡습니다."
            echo "### daily-update(funnel): SITE OFFLINE ($TODAY)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "health: $(echo "$HEALTH" | head -c 300)"

          echo "=== 2. Forecast freshness (completed today >= 06:00 KST?) ==="
          # 사이트 API의 completed_at 은 naive 타임스탬프(실측상 UTC) —
          # KST/UTC 양쪽 해석 중 하나라도 오늘 아침이면 신선으로 판정.
          FC=$(curl -sf --max-time 20 "$BASE/api/forecast" 2>/dev/null || echo '{}')
          AG=$(curl -sf --max-time 20 "$BASE/api/agents" 2>/dev/null || echo '{}')
          FRESH=$(FC="$FC" AG="$AG" python3 - <<'PY'
          import os, json
          from datetime import datetime, timezone, timedelta
          KST = timezone(timedelta(hours=9))
          def load(name):
              try:
                  return json.loads(os.environ.get(name) or '{}')
              except Exception:
                  return {}
          fc, ag = load('FC'), load('AG')
          stamps = []
          if fc.get('created_kst'):
              stamps.append((fc['created_kst'], 'kst'))
          ca = (ag.get('run') or {}).get('completed_at')
          if ca:
              stamps.append((ca, 'unknown'))
          today = datetime.now(KST).date()
          ok = False
          for s, hint in stamps:
              try:
                  ts = datetime.fromisoformat(s)
              except Exception:
                  continue
              if ts.tzinfo:
                  cands = [ts.astimezone(KST)]
              elif hint == 'kst':
                  cands = [ts.replace(tzinfo=KST)]
              else:
                  cands = [ts.replace(tzinfo=KST), ts.replace(tzinfo=timezone.utc).astimezone(KST)]
              if any(c.date() == today and c.hour >= 6 for c in cands):
                  ok = True
          print('yes' if ok else 'no')
          PY
          )
          RUNINFO=$(echo "$AG" | python3 -c "import sys,json; r=(json.load(sys.stdin).get('run') or {}); print(f\"run.id={r.get('id','?')} completed_at={r.get('completed_at','?')}\")" 2>/dev/null || echo "?")
          echo "$RUNINFO fresh=$FRESH"

          echo "=== 3. Today's briefing exists? ==="
          BRIEF=$(curl -sf --max-time 20 "$BASE/api/briefing/latest?date=$TODAY" 2>/dev/null | python3 -c "
          import sys, json
          try:
              print('yes' if json.load(sys.stdin).get('brief') else 'no')
          except Exception:
              print('no')
          " || echo no)
          echo "briefing($TODAY): $BRIEF"

          {
            echo "### daily-update(funnel) verify — $TODAY KST"
            echo '```'
            echo "$RUNINFO"
            echo "forecast_fresh=$FRESH briefing_today=$BRIEF"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FRESH" = "yes" ] && [ "$BRIEF" = "yes" ]; then
            echo "오늘 아침 업데이트 완료 확인."
            exit 0
          fi
          echo "미갱신 상태입니다. 외부에서는 기동할 수 없으므로(POST 401 보호)"
          echo "사이트의 내부 스케줄러/부팅 warm-up 또는 PC 로컬 작업"
          echo "(scheduler/daily_update_krw.ps1)이 복구해야 합니다."
          exit 1

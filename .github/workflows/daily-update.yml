name: Daily 8AM KST auto-update

# 매일 아침 8시(KST)까지 krw-watcher의 위원회 사이클 + 데일리 브리프가
# "완료"되어 있도록 한다: 06:45 KST에 기동해 사이클(~20-35분) + 브리프
# (~5-15분)가 8시 전에 끝나게 한다.
#
# 대상은 두 곳이다 (둘 다 업데이트):
#   - 클라우드: https://krw-watcher.onrender.com  — 항상 살아 있음(무료 티어라
#     잠들어 있으면 깨워서 진행). 여기가 실패하면 이 런은 실패로 처리되어
#     스윕이 재시도한다.
#   - PC(Tailscale Funnel): https://krw-watcher.tail3e31a9.ts.net — PC가 꺼져
#     있으면 정상 상황이므로 건너뛰고(경고만), 이후 매시 스윕과 PC 자체의
#     로컬 폴백 작업(scheduler/daily_update.ps1)이 켜지는 대로 따라잡는다.
#
# 본 실행이 실패하면 07:30, 08:00, 09~14시(KST) 스윕이 신선도 검사 후
# 성공할 때까지 재시도한다. 이미 오늘 아침 결과가 있으면 no-op이라 AI 토큰이
# 이중으로 소모되지 않는다.
#
# 신선도·완료 판정은 /api/agents 의 run.completed_at / run.id 를 사용한다.
# (라이브 빌드의 /api/forecast 는 created_kst 를 노출하지 않고, /health 에는
# cycle_running 이 없다. completed_at 은 PC 빌드가 naive-KST, 클라우드 포트가
# UTC(+00:00)라서 KST로 정규화해 비교한다.)

on:
  schedule:
    - cron: "45 21 * * *"  # 06:45 KST — 본 실행 (8시 전 완료 목표)
    - cron: "30 22 * * *"  # 07:30 KST — 조기 재시도 스윕 (신선하면 no-op)
    - cron: "0 23 * * *"   # 08:00 KST — 재시도 스윕
    - cron: "0 0-5 * * *"  # 09:00~14:00 KST 매시 — 재시도 스윕
  workflow_dispatch:
    inputs:
      url:
        description: "Update ONLY this base URL (empty = both targets)"
        default: ""
      force:
        description: "Trigger a cycle even if today's forecast is fresh"
        type: boolean
        default: false

concurrency:
  group: daily-update-krw
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Trigger and verify the daily update (cloud + PC)
        env:
          URL_OVERRIDE: ${{ github.event.inputs.url || '' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          set -u
          TODAY=$(TZ=Asia/Seoul date +%F)
          CLOUD="https://krw-watcher.onrender.com"
          PC="https://krw-watcher.tail3e31a9.ts.net"
          if [ -n "$URL_OVERRIDE" ]; then
            TARGETS="${URL_OVERRIDE%/}"
          else
            TARGETS="$CLOUD $PC"
          fi
          echo "targets: $TARGETS | today(KST)=$TODAY force=$FORCE"

          # run_info <base>: prints "<run_id>|<completed_at>" from /api/agents
          run_info() {
            curl -sf --max-time 20 "$1/api/agents" 2>/dev/null | python3 -c "
          import sys, json
          try:
              r = (json.load(sys.stdin).get('run') or {})
              print(f\"{r.get('id','')}|{r.get('completed_at','')}\")
          except Exception:
              print('|')
          " || echo "|"
          }
          # is_fresh <completed_at>: "yes" if today(KST) >= 06:30. Naive
          # timestamps are PC-build KST; tz-aware ones are normalized to KST.
          is_fresh() {
            python3 -c "
          from datetime import datetime, time, timezone, timedelta
          ts = '''$1'''
          try:
              d = datetime.fromisoformat(ts)
              if d.tzinfo:
                  d = d.astimezone(timezone(timedelta(hours=9)))
              print('yes' if d.date().isoformat() == '$TODAY' and d.time() >= time(6, 30) else 'no')
          except Exception:
              print('no')
          "
          }
          brief_date() {
            curl -sf --max-time 20 "$1/api/briefing/latest" 2>/dev/null | python3 -c "
          import sys, json
          try:
              print((json.load(sys.stdin).get('brief') or {}).get('date', ''))
          except Exception:
              print('')
          " || echo ""
          }
          slug() { case "$1" in "$CLOUD") echo cloud ;; "$PC") echo pc ;; *) echo custom ;; esac; }

          # ── Phase A: per-target wake + freshness + kick the cycle ──────────
          POLL=""     # targets whose cycle we must wait for
          for BASE in $TARGETS; do
            S=$(slug "$BASE")
            echo "=== [$S] wake $BASE (up to ~3.5 min; Render cold start) ==="
            HEALTH=""
            for i in $(seq 1 10); do
              HEALTH=$(curl -sf --max-time 25 "$BASE/health" 2>/dev/null || echo "")
              [ -n "$HEALTH" ] && break
              echo "  [$i] unreachable, waiting 20s..."
              sleep 20
            done
            if [ -z "$HEALTH" ]; then
              echo "OFFLINE" > "/tmp/$S.state"
              echo "[$S] OFFLINE"
              continue
            fi
            echo "[$S] health: $(echo "$HEALTH" | head -c 200)"

            INFO=$(run_info "$BASE")
            RID="${INFO%%|*}"
            CAT="${INFO#*|}"
            FRESH=$(is_fresh "$CAT")
            echo "[$S] last run: id=${RID:-?} completed_at=${CAT:-?} fresh=$FRESH"
            echo "$RID" > "/tmp/$S.before"

            if [ "$FORCE" != "true" ] && [ "$FRESH" = "yes" ]; then
              echo "already_fresh" > "/tmp/$S.state"
              echo "[$S] today's morning forecast already fresh — no cycle."
            else
              CODE=$(curl -sS -X POST --max-time 60 -o "/tmp/$S.cycle" -w '%{http_code}' "$BASE/api/cycle" || echo "000")
              echo "[$S] POST /api/cycle -> HTTP $CODE, body: $(head -c 200 "/tmp/$S.cycle" 2>/dev/null)"
              echo "cycling" > "/tmp/$S.state"
              POLL="$POLL $BASE"
            fi
          done

          # ── Phase B: wait until every kicked target's run.id changes ───────
          if [ -n "$POLL" ]; then
            echo "=== waiting for cycle completion on:$POLL (up to ~40 min) ==="
            for i in $(seq 1 80); do
              sleep 30
              REMAIN=""
              for BASE in $POLL; do
                S=$(slug "$BASE")
                INFO=$(run_info "$BASE")
                RID="${INFO%%|*}"
                CAT="${INFO#*|}"
                BEFORE=$(cat "/tmp/$S.before" 2>/dev/null || echo "")
                if [ -n "$RID" ] && [ "$RID" != "$BEFORE" ]; then
                  echo "  [$i][$S] cycle complete: run.id=$RID completed_at=$CAT"
                  echo "cycle_done" > "/tmp/$S.state"
                else
                  REMAIN="$REMAIN $BASE"
                fi
              done
              POLL="$REMAIN"
              [ -z "$POLL" ] && break
              echo "  [$i] still cycling:$POLL"
            done
            for BASE in $POLL; do
              S=$(slug "$BASE")
              echo "cycle_timeout" > "/tmp/$S.state"
              echo "[$S] cycle did not complete within the window."
            done
          fi

          # ── Phase C: briefings (only where today's is missing) ─────────────
          for BASE in $TARGETS; do
            S=$(slug "$BASE")
            STATE=$(cat "/tmp/$S.state" 2>/dev/null || echo "?")
            [ "$STATE" = "OFFLINE" ] && continue
            BD=$(brief_date "$BASE")
            if [ "$BD" = "$TODAY" ]; then
              echo "[$S] briefing for $TODAY already exists."
              echo "yes" > "/tmp/$S.brief"
              continue
            fi
            echo "[$S] generating today's briefing (blocking, up to 15 min)..."
            BCODE=$(curl -sS -X POST --max-time 900 -o "/tmp/$S.briefout" -w '%{http_code}' "$BASE/api/briefing/generate" || echo "000")
            echo "[$S] POST /api/briefing/generate -> HTTP $BCODE"
            BD=$(brief_date "$BASE")
            [ "$BD" = "$TODAY" ] && echo "yes" > "/tmp/$S.brief" || echo "no" > "/tmp/$S.brief"
            echo "[$S] briefing verified: $(cat "/tmp/$S.brief") (latest date: '${BD:-none}')"
          done

          # ── Verdict ────────────────────────────────────────────────────────
          RC=0
          {
            echo "### daily-update ($TODAY KST)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          for BASE in $TARGETS; do
            S=$(slug "$BASE")
            STATE=$(cat "/tmp/$S.state" 2>/dev/null || echo "?")
            BRIEF=$(cat "/tmp/$S.brief" 2>/dev/null || echo "-")
            echo "$S: cycle=$STATE briefing=$BRIEF" | tee -a "$GITHUB_STEP_SUMMARY"
            case "$S:$STATE:$BRIEF" in
              pc:OFFLINE:*) echo "::warning::PC target offline — normal if the PC is off; sweeps + local task will catch up." ;;
              *:OFFLINE:*)          RC=1 ;;
              *:cycle_timeout:*)    RC=1 ;;
              *:*:no)               RC=1 ;;
            esac
          done
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit $RC

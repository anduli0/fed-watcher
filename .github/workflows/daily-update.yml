name: Daily 8AM KST auto-update

# PC 퍼널 사이트(krw-watcher.tail3e31a9.ts.net)의 "08:00 KST까지 업데이트
# 완료"를 검증하고, 미완료 시 경보를 남기는 워크플로우.
#
# 실측으로 확인된 사실 (2026-07-06 run #4):
#   - 원본 PC 앱은 자체 스케줄러로 아침 사이클을 돌려 ~07:30 KST에 완료한다.
#   - 퍼널(공개) 경유의 변경성 POST(/api/cycle 등)는 HTTP 401 Unauthorized.
#     테일넷 신원이 있는 요청만 허용되므로 GitHub 러너로는 강제할 수 없다.
#   - 타임스탬프는 naive UTC (completed_at), 스키마는 리포 포트와 다름
#     (/health에 cycle_running 없음, /api/forecast에 created_kst 없음).
#
# 따라서 이 워크플로우는: 07:50 KST에 오늘 아침 완료 여부를 검증하고,
# 미완료면 (혹시 허용될 경우를 대비해) POST를 1회 시도한 뒤 최대 60분
# 완료를 기다린다. PC가 꺼져 있으면 실패로 끝나고 매시 스윕이 PC가
# 켜진 뒤(앱의 부팅 워밍업이 스스로 사이클을 돌린다) 완료를 재확인한다.
# 08:10 KST의 클로드 감시견 루틴이 실패를 진단·보고한다.

on:
  schedule:
    - cron: "50 22-23 * * *"  # 07:50, 08:50 KST — 아침 완료 검증
    - cron: "50 0-5 * * *"    # 09:50~14:50 KST 매시 — PC 늦게 켜진 경우 따라잡기 확인
  workflow_dispatch:
    inputs:
      url:
        description: "Base URL of the krw-watcher site"
        default: "https://krw-watcher.tail3e31a9.ts.net"
      force:
        description: "Attempt a cycle POST even if today's forecast is fresh"
        type: boolean
        default: false

concurrency:
  group: daily-update-krw-funnel
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    permissions:
      contents: read
    steps:
      - name: Verify (and if possible trigger) the daily update
        env:
          BASE: ${{ github.event.inputs.url || 'https://krw-watcher.tail3e31a9.ts.net' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          set -u
          BASE="${BASE%/}"
          TODAY=$(TZ=Asia/Seoul date +%F)
          echo "target=$BASE today(KST)=$TODAY force=$FORCE"

          # 신선도: 오늘(KST) 06:00 이후 완료된 예측이 있으면 yes.
          # created_kst(포트, KST)와 run.completed_at(원본, naive → KST/UTC
          # 이중 해석) 중 하나라도 조건을 만족하면 신선.
          fresh_check () {
            FC=$(curl -sf --max-time 20 "$BASE/api/forecast" 2>/dev/null || echo '{}')
            AG=$(curl -sf --max-time 20 "$BASE/api/agents" 2>/dev/null || echo '{}')
            FC="$FC" AG="$AG" python3 - <<'PY'
          import os, json
          from datetime import datetime, timezone, timedelta
          KST = timezone(timedelta(hours=9))
          def load(name):
              try:
                  return json.loads(os.environ.get(name) or '{}')
              except Exception:
                  return {}
          fc, ag = load('FC'), load('AG')
          stamps = []
          if fc.get('created_kst'):
              stamps.append(('created_kst', fc['created_kst'], 'kst'))
          ca = (ag.get('run') or {}).get('completed_at')
          if ca:
              stamps.append(('completed_at', ca, 'unknown'))
          today = datetime.now(KST).date()
          ok = False
          for name, s, hint in stamps:
              try:
                  ts = datetime.fromisoformat(s)
              except Exception:
                  continue
              if ts.tzinfo:
                  cands = [ts.astimezone(KST)]
              elif hint == 'kst':
                  cands = [ts.replace(tzinfo=KST)]
              else:
                  cands = [ts.replace(tzinfo=KST), ts.replace(tzinfo=timezone.utc).astimezone(KST)]
              print(f"  stamp {name}={s}")
              if any(c.date() == today and c.hour >= 6 for c in cands):
                  ok = True
          print('FRESH=yes' if ok else 'FRESH=no')
          PY
          }

          echo "=== 1. Reachability (5 tries, 30s backoff) ==="
          HEALTH=""
          for i in $(seq 1 5); do
            HEALTH=$(curl -sf --max-time 20 "$BASE/health" 2>/dev/null || echo "")
            if [ -n "$HEALTH" ]; then break; fi
            echo "  [$i] unreachable, waiting 30s..."
            sleep 30
          done
          if [ -z "$HEALTH" ]; then
            echo "SITE OFFLINE — 호스트 PC가 꺼져 있을 수 있습니다. PC가 켜지면 앱이 스스로"
            echo "워밍업 사이클을 돌리고, 다음 매시 스윕이 완료를 확인합니다."
            echo "### daily-update(funnel): SITE OFFLINE ($TODAY)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "health: $(echo "$HEALTH" | head -c 300)"

          echo "=== 2. Morning-completion check ==="
          FOUT=$(fresh_check); echo "$FOUT"
          FRESH=$(echo "$FOUT" | tail -1 | cut -d= -f2)

          CYCLE="already_fresh"
          if [ "$FORCE" = "true" ] || [ "$FRESH" != "yes" ]; then
            echo "=== 3. Attempt external cycle trigger (funnel POSTs are expected to 401) ==="
            CODE=$(curl -s -o /tmp/cycle_resp -w '%{http_code}' -X POST --max-time 120 "$BASE/api/cycle" || echo "ERR")
            echo "POST /api/cycle -> HTTP $CODE body: $(head -c 300 /tmp/cycle_resp 2>/dev/null)"

            echo "=== 4. Wait for the app to complete the update itself (up to 60 min) ==="
            CYCLE="not_completed"
            for i in $(seq 1 60); do
              sleep 60
              FOUT=$(fresh_check)
              FRESH=$(echo "$FOUT" | tail -1 | cut -d= -f2)
              echo "  [$i] fresh=$FRESH"
              if [ "$FRESH" = "yes" ]; then CYCLE="updated"; break; fi
            done
            if [ "$CYCLE" != "updated" ]; then
              echo "오늘 아침 완료된 예측이 아직 없습니다. 외부 강제는 401로 차단되어 있어"
              echo "PC 앱의 자체 스케줄/워밍업이 돌아야 합니다. 다음 스윕이 재확인합니다."
              echo "### daily-update(funnel): not completed yet ($TODAY)" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          else
            echo "오늘 아침 예측이 이미 완료되어 있습니다."
          fi

          echo "=== 5. Daily briefing check ==="
          has_brief () {
            curl -sf --max-time 20 "$BASE/api/briefing/latest?date=$TODAY" 2>/dev/null | python3 -c "
          import sys, json
          try:
              print('yes' if json.load(sys.stdin).get('brief') else 'no')
          except Exception:
              print('no')
          " || echo no
          }
          BRIEF="up_to_date"
          if [ "$(has_brief)" != "yes" ]; then
            CODE=$(curl -s -o /tmp/brief_resp -w '%{http_code}' -X POST --max-time 900 "$BASE/api/briefing/generate" || echo "ERR")
            echo "POST /api/briefing/generate -> HTTP $CODE body: $(head -c 300 /tmp/brief_resp 2>/dev/null)"
            BRIEF="missing"
            for i in $(seq 1 10); do
              if [ "$(has_brief)" = "yes" ]; then BRIEF="generated"; break; fi
              sleep 30
            done
            echo "briefing: $BRIEF"
          else
            echo "오늘($TODAY) 브리프가 이미 존재합니다."
          fi

          {
            echo "### daily-update(funnel) $TODAY KST"
            echo '```'
            echo "cycle=$CYCLE briefing=$BRIEF"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          [ "$BRIEF" = "missing" ] && exit 1
          exit 0

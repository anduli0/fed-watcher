name: Deploy to Render

on:
  push:
    branches: [main, master, claude/krw-watched-web-deploy-ny4ym8]
    paths-ignore:
      - 'frontend/**'
      - '**.md'
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Skip redeploy; just run the AI cycle on the current live container"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Setup Render service and env vars
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -e

          echo "=== Getting Render owner info ==="
          OWNER_RESP=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/owners?limit=1")
          echo "Owner response: $OWNER_RESP"
          OWNER_ID=$(echo "$OWNER_RESP" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data[0]['owner']['id'])
          ")
          echo "Owner ID: $OWNER_ID"

          echo "=== Checking existing services ==="
          SERVICES=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?limit=20")

          SERVICE_ID=$(echo "$SERVICES" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data:
            svc = item.get('service', {})
            if 'fed-watcher' in svc.get('name','').lower():
              print(svc['id'])
              break
          " 2>/dev/null || true)

          # If a service exists, check whether its last deploy went live.
          # The original service was created as a Python buildpack (master had no
          # Dockerfile at creation) and is permanently broken (exit 127). A buildpack
          # service can't be converted to Docker via API, so delete and recreate.
          NEEDS_RECREATE="no"
          if [ -n "$SERVICE_ID" ]; then
            LAST_STATUS=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$SERVICE_ID/deploys?limit=1" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print((d[0].get('deploy',d[0])).get('status','')) if d else print('')" 2>/dev/null || echo "")
            RUNTIME=$(echo "$SERVICES" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data:
            svc = item.get('service', {})
            if 'fed-watcher' in svc.get('name','').lower():
              sd = svc.get('serviceDetails', {})
              print(sd.get('env') or sd.get('runtime') or '?')
              break
          " 2>/dev/null || echo "?")
            echo "Existing service $SERVICE_ID: last_deploy=$LAST_STATUS runtime=$RUNTIME"
            case "$LAST_STATUS" in
              build_failed|update_failed|canceled|pre_deploy_failed|deactivated)
                echo "Last deploy failed ($LAST_STATUS) -> deleting to recreate cleanly as Docker"
                curl -s -X DELETE -H "Authorization: Bearer $RENDER_API_KEY" \
                  "https://api.render.com/v1/services/$SERVICE_ID" -o /dev/null -w "delete HTTP %{http_code}\n"
                SERVICE_ID=""
                sleep 5
                ;;
              *)
                echo "Last deploy status '$LAST_STATUS' is live or in-progress -> keeping service"
                ;;
            esac
          fi

          if [ -z "$SERVICE_ID" ]; then
            echo "=== Creating new Render service (Docker, branch ${GITHUB_REF_NAME}) ==="
            CREATE_RESP=$(curl -s -X POST "https://api.render.com/v1/services" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                \"type\": \"web_service\",
                \"name\": \"fed-watcher-backend\",
                \"ownerId\": \"$OWNER_ID\",
                \"repo\": \"https://github.com/anduli0/fed-watcher\",
                \"branch\": \"${GITHUB_REF_NAME}\",
                \"autoDeploy\": \"yes\",
                \"serviceDetails\": {
                  \"env\": \"docker\",
                  \"plan\": \"free\",
                  \"region\": \"oregon\",
                  \"healthCheckPath\": \"/health\",
                  \"dockerfilePath\": \"./Dockerfile\",
                  \"envSpecificDetails\": {
                    \"dockerfilePath\": \"./Dockerfile\",
                    \"dockerContext\": \".\"
                  }
                }
              }")
            echo "Create response: $CREATE_RESP"
            SERVICE_ID=$(echo "$CREATE_RESP" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if 'service' in data:
            data = data['service']
          print(data.get('id',''))
          " 2>/dev/null || echo "")
          fi

          echo "Service ID: $SERVICE_ID"
          if [ -z "$SERVICE_ID" ]; then echo "ERROR: no service id"; exit 1; fi

          # NOTE: a PUT to /env-vars makes Render auto-trigger a redeploy even when
          # the values are unchanged. Skip it for skip_deploy runs so the AI-cycle
          # verification isn't interrupted by a container swap.
          if [ "${{ github.event.inputs.skip_deploy }}" = "true" ]; then
            echo "=== skip_deploy=true -> NOT updating env vars (avoids auto-redeploy) ==="
          else
          # The service builds whatever branch it is pinned to, which is not
          # necessarily the branch that triggered this workflow. Repoint it so
          # the code being deployed is the code that was just pushed.
          echo "=== Pointing service at branch ${GITHUB_REF_NAME} ==="
          curl -s -X PATCH "https://api.render.com/v1/services/$SERVICE_ID" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"branch\": \"${GITHUB_REF_NAME}\"}" \
            -o /dev/null -w "branch PATCH -> HTTP %{http_code}\n"

          echo "=== Setting environment variables ==="
          ENV_VARS=$(python3 -c "
          import json, os
          vars = [
            {'key': 'ALLOWED_IPS',        'value': '*'},
            {'key': 'DEV_MODE',           'value': 'false'},
            {'key': 'JWT_SECRET',         'value': os.environ['JWT_SECRET']},
            {'key': 'ADMIN_PASSWORD_HASH','value': os.environ['ADMIN_PASSWORD_HASH']},
            {'key': 'FRED_API_KEY',       'value': os.environ['FRED_API_KEY']},
          ]
          # Prefer the long-lived OAuth token (claude setup-token) — it does not
          # expire like a .credentials.json snapshot. Fall back to CLAUDE_CREDENTIALS.
          oauth = os.environ.get('CLAUDE_CODE_OAUTH_TOKEN','')
          if oauth:
            vars.append({'key': 'CLAUDE_CODE_OAUTH_TOKEN', 'value': oauth})
          creds = os.environ.get('CLAUDE_CREDENTIALS','')
          if creds:
            vars.append({'key': 'CLAUDE_CREDENTIALS', 'value': creds})
          print(json.dumps(vars))
          ")

          curl -sf -X PUT \
            "https://api.render.com/v1/services/$SERVICE_ID/env-vars" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$ENV_VARS"
          fi

          echo "=== Getting service URL ==="
          INFO=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID")
          URL=$(echo "$INFO" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          svc = d.get('service', d)
          print(svc.get('serviceDetails', {}).get('url', '(deploying...)'))
          " 2>/dev/null || echo "(deploying...)")
          echo "Render service URL: $URL"

          echo "=== Saving service info to file ==="
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "SERVICE_ID=$SERVICE_ID" > render-deployment.txt
          echo "URL=$URL" >> render-deployment.txt
          git add render-deployment.txt || true
          (git diff --staged --quiet || git commit -m "ci: update Render deployment info [skip ci]") || true
          git push origin HEAD:"${GITHUB_REF_NAME}" || true
          echo "Saved SERVICE_ID=$SERVICE_ID and URL=$URL"

          SKIP_DEPLOY="${{ github.event.inputs.skip_deploy }}"
          NEW_DEPLOY_ID=""
          if [ "$SKIP_DEPLOY" = "true" ]; then
            echo "=== skip_deploy=true -> not triggering a deploy in the deploy job ==="
          else
            echo ""
            echo "=== Triggering fresh Render deploy (API-created services lack GitHub webhook) ==="
            DEPLOY_RESP=$(curl -s -X POST -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
              -d '{"clearCache":"do_not_clear"}')
            echo "Deploy trigger response: $DEPLOY_RESP"
            NEW_DEPLOY_ID=$(echo "$DEPLOY_RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d.get('id', d.get('deploy', {}).get('id', '')))" 2>/dev/null || echo "")
            echo "New deploy ID: $NEW_DEPLOY_ID"
          fi

          echo ""
          echo "=== Polling deploy status (up to 20 min) ==="
          FINAL_STATUS="unknown"
          if [ -n "$NEW_DEPLOY_ID" ]; then
            for i in $(seq 1 80); do
              sleep 15
              STATUS=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
                "https://api.render.com/v1/services/$SERVICE_ID/deploys/$NEW_DEPLOY_ID" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status', d.get('deploy',{}).get('status','?')))" 2>/dev/null || echo "?")
              echo "  [$i] status=$STATUS"
              FINAL_STATUS="$STATUS"
              case "$STATUS" in
                live|deactivated) echo "Deploy finished: $STATUS"; break ;;
                build_failed|update_failed|canceled|pre_deploy_failed) echo "Deploy failed: $STATUS"; break ;;
              esac
            done
          fi

          echo ""
          echo "=== Health Check (waiting up to 60s for service to wake) ==="
          HEALTH=""
          for i in $(seq 1 6); do
            HEALTH=$(curl -sf --max-time 15 "$URL/health" 2>/dev/null || echo "")
            if [ -n "$HEALTH" ]; then break; fi
            echo "Attempt $i: service not ready yet, waiting 10s..."
            sleep 10
          done
          echo "Health response: ${HEALTH:-OFFLINE}"

          echo ""
          echo "=== Endpoint probes ==="
          FC=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$URL/api/forecast" 2>/dev/null || echo "ERR")
          BRIEF=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$URL/api/briefings/latest" 2>/dev/null || echo "ERR")
          AGENTS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$URL/api/agents/status" 2>/dev/null || echo "ERR")
          echo "  /api/forecast -> $FC"
          echo "  /api/briefings/latest -> $BRIEF"
          echo "  /api/agents/status -> $AGENTS"

          echo ""
          echo "=== Render deploy status ==="
          curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys?limit=3" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for d in data[:3]:
            dep = d.get('deploy', d)
            print(f'  {dep.get(\"status\")} | {dep.get(\"createdAt\",\"\")[:19]} | {dep.get(\"commit\",{}).get(\"message\",\"\")[:50]}')
          " 2>/dev/null || echo "Could not fetch"

          # write verification result
          echo "HEALTH=${HEALTH:-OFFLINE}" >> render-deployment.txt
          echo "DEPLOY_STATUS=$FINAL_STATUS" >> render-deployment.txt
          git add render-deployment.txt || true
          (git diff --staged --quiet || git commit -m "ci: add verification results [skip ci]") || true
          git push origin HEAD:"${GITHUB_REF_NAME}" || true
  
  check-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: deploy
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Trigger deploy, poll status, write results
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set +e
          # Read the (possibly freshly recreated) service id written by the deploy job
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          SERVICE_ID=$(grep '^SERVICE_ID=' render-deployment.txt | cut -d= -f2)
          echo "Service ID from deploy job: $SERVICE_ID"

          echo "=== Current service info ==="
          curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID" > /tmp/svc.json
          cat /tmp/svc.json

          echo ""
          echo "=== Existing deploys ==="
          curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys?limit=5" > /tmp/deploys.json
          cat /tmp/deploys.json

          LAST_STATUS=$(python3 -c "import json; d=json.load(open('/tmp/deploys.json')); print((d[0].get('deploy',d[0])).get('status','')) if d else print('')" 2>/dev/null || echo "")
          echo "Last deploy status: $LAST_STATUS"

          SKIP_DEPLOY="${{ github.event.inputs.skip_deploy }}"
          DEPLOY_ID=""
          FINAL_STATUS="unknown"
          : > /tmp/newdeploy.json
          if [ "$SKIP_DEPLOY" = "true" ]; then
            echo "=== skip_deploy=true -> NOT redeploying; running AI cycle on current live container ==="
            FINAL_STATUS="$LAST_STATUS"
          else
          echo "=== Triggering fresh deploy with latest commit (always, to pick up new code) ==="
          curl -s -X POST -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -d '{"clearCache":"clear"}' > /tmp/newdeploy.json
          echo "--- raw deploy response ---"
          cat /tmp/newdeploy.json
          echo ""
          DEPLOY_ID=$(python3 -c "import json; d=json.load(open('/tmp/newdeploy.json')); print(d.get('id', d.get('deploy',{}).get('id','')))" 2>/dev/null || echo "")
          echo "New deploy ID: $DEPLOY_ID"

          echo ""
          echo "=== Polling service's latest deploy until live (up to ~18 min) ==="
          # The deploy POST sometimes returns an empty body (no id) even though the
          # deploy is created, so poll the service's most-recent deploy by status
          # rather than a specific id. This makes us actually wait for the build to
          # finish before capturing status (important now the Docker build also
          # compiles the frontend and takes several minutes).
          for i in $(seq 1 72); do
            sleep 15
            STATUS=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$SERVICE_ID/deploys?limit=1" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print((d[0].get('deploy',d[0])).get('status','?')) if d else print('?')" 2>/dev/null || echo "?")
            echo "  [$i] latest deploy status=$STATUS"
            FINAL_STATUS="$STATUS"
            case "$STATUS" in
              live) break ;;
              build_failed|update_failed|canceled|pre_deploy_failed) break ;;
            esac
          done
          # Let the freshly-swapped container settle before probing / cycling
          echo "Deploy reached: $FINAL_STATUS — waiting 45s for the container to settle"
          sleep 45
          fi
          SVC_URL=$(python3 -c "import json; d=json.load(open('/tmp/svc.json')); s=d.get('service',d); print(s.get('serviceDetails',{}).get('url',''))" 2>/dev/null || echo "")
          echo "Service URL: $SVC_URL"

          echo ""
          echo "=== Final health check ==="
          HEALTH=$(curl -sf --max-time 30 "$SVC_URL/health" 2>/dev/null || echo "OFFLINE")
          echo "Health: $HEALTH"

          echo ""
          echo "=== Endpoint probes (correct route paths) ==="
          FC=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$SVC_URL/api/forecast" 2>/dev/null || echo "ERR")
          BRIEF=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$SVC_URL/api/briefings/latest" 2>/dev/null || echo "ERR")
          AGENTS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$SVC_URL/api/agents/status" 2>/dev/null || echo "ERR")
          # Frontend probes (unified deploy): / and /login/ should serve HTML 200
          ROOT_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$SVC_URL/" 2>/dev/null || echo "ERR")
          ROOT_CT=$(curl -s -o /dev/null -w '%{content_type}' --max-time 30 "$SVC_URL/" 2>/dev/null || echo "ERR")
          LOGIN_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$SVC_URL/login/" 2>/dev/null || echo "ERR")
          ADMIN_API=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$SVC_URL/admin-secure-panel/api/status" 2>/dev/null || echo "ERR")
          echo "  /api/forecast -> $FC"
          echo "  /api/briefings/latest -> $BRIEF"
          echo "  /api/agents/status -> $AGENTS"
          echo "  / (frontend) -> $ROOT_CODE ($ROOT_CT)"
          echo "  /login/ (frontend) -> $LOGIN_CODE"
          echo "  /admin-secure-panel/api/status (should be 401) -> $ADMIN_API"
          PROBES="forecast=$FC briefings=$BRIEF agents=$AGENTS root=$ROOT_CODE/$ROOT_CT login=$LOGIN_CODE adminapi=$ADMIN_API"

          echo ""
          echo "=== LIVE AI CYCLE VERIFICATION (proves claude CLI / Pro creds) ==="
          # Snapshot activity log id before triggering
          BEFORE_ID=$(curl -sf --max-time 20 "$SVC_URL/api/activity" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(max([e['id'] for e in d], default=0))" 2>/dev/null || echo 0)
          echo "activity id before trigger: $BEFORE_ID"

          echo "Triggering 21-agent cycle..."
          TRIG=$(curl -s --max-time 30 -X POST "$SVC_URL/api/trigger-cycle" 2>/dev/null || echo "{}")
          echo "trigger response: $TRIG"

          echo "Polling activity log for agent events (up to ~25 min; 21 agents run serialized)..."
          AI_EVENTS=0
          AGENT_LINES=""
          AGENT_TALLY=""
          for i in $(seq 1 100); do
            sleep 15
            ACT=$(curl -sf --max-time 20 "$SVC_URL/api/activity?after_id=$BEFORE_ID" 2>/dev/null || echo "[]")
            COUNT=$(echo "$ACT" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo 0)
            AGENTCOUNT=$(echo "$ACT" | python3 -c "import sys,json; print(sum(1 for e in json.load(sys.stdin) if e.get('agent')))" 2>/dev/null || echo 0)
            # Tally analysis-agent outcomes (exclude the data-sweep 'System'/fetch lines)
            AGENT_TALLY=$(echo "$ACT" | python3 -c "
          import sys, json
          ok=err=0
          for e in json.load(sys.stdin):
            a=e.get('agent'); s=e.get('status','')
            if not a: continue
            m=e.get('message','').lower()
            if 'fail' in m or s=='error': err+=1
            elif s in ('ok','success') or 'forecast →' in m or 'synthesiz' in m: ok+=1
          print(f'{ok} {err}')
          " 2>/dev/null || echo "0 0")
            echo "  [$i] new activity=$COUNT agent events=$AGENTCOUNT (ok/err: $AGENT_TALLY)"
            if [ "$AGENTCOUNT" -gt 0 ]; then
              AI_EVENTS=$AGENTCOUNT
              AGENT_LINES=$(echo "$ACT" | python3 -c "
          import sys, json
          for e in json.load(sys.stdin):
            if e.get('agent'):
              print(f\"  {e.get('agent')}: {e.get('message','')[:80]} [{e.get('status')}]\")
          " 2>/dev/null | tail -30)
            fi
            # Cycle truly completes when the Chief synthesizes the derivation report.
            DONE=$(echo "$ACT" | python3 -c "import sys,json; print(1 if any(('chief' in (e.get('agent','') or '').lower()) and ('synthesiz' in (e.get('message','').lower()) or 'forecast →' in e.get('message','')) for e in json.load(sys.stdin)) else 0)" 2>/dev/null || echo 0)
            if [ "$DONE" = "1" ]; then echo "  Chief synthesis seen -> cycle complete"; break; fi
          done

          echo ""
          echo "=== Forecast after cycle ==="
          FORECAST_JSON=$(curl -sf --max-time 30 "$SVC_URL/api/forecast" 2>/dev/null || echo "{}")
          echo "$FORECAST_JSON"
          echo ""
          echo "=== Agent status after cycle ==="
          AGENTS_JSON=$(curl -sf --max-time 30 "$SVC_URL/api/agents/status" 2>/dev/null || echo "[]")
          echo "$AGENTS_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print('agents reporting:', len(d) if isinstance(d,list) else d)" 2>/dev/null || true

          echo ""
          echo "=== Events (incl. any OOM during the cycle) ==="
          curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID/events?limit=30" > /tmp/events.json 2>/dev/null || echo '[]' > /tmp/events.json
          cat /tmp/events.json
          OOM_DURING=$(python3 -c "
          import json
          try:
            evs=json.load(open('/tmp/events.json'))
            print(sum(1 for e in evs if 'oomKilled' in json.dumps(e)))
          except Exception:
            print('?')
          " 2>/dev/null || echo "?")
          echo "oomKilled events in window: $OOM_DURING"

          echo ""
          echo "=== BUILD LOGS (last deploy) ==="
          OWNER_ID=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/owners?limit=1" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['owner']['id'])" 2>/dev/null || echo "")
          # Newer Render logs API: filter by owner + resource (service id), build logs
          curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/logs?ownerId=$OWNER_ID&resource=$SERVICE_ID&limit=100&direction=backward" \
            > /tmp/logs.json 2>/dev/null || echo '{}' > /tmp/logs.json
          python3 -c "
          import json
          try:
            d = json.load(open('/tmp/logs.json'))
            logs = d.get('logs', d) if isinstance(d, dict) else d
            if isinstance(logs, list):
              for entry in logs[-80:]:
                msg = entry.get('message', entry) if isinstance(entry, dict) else entry
                print(msg)
            else:
              print(json.dumps(d)[:2000])
          except Exception as e:
            print('log parse error:', e)
            print(open('/tmp/logs.json').read()[:2000])
          " | tee /tmp/buildlog.txt

          # Stash AI-cycle findings for the summary
          echo "$AI_EVENTS" > /tmp/ai_events.txt
          printf '%s\n' "$AGENT_LINES" > /tmp/agent_lines.txt
          printf '%s\n' "$FORECAST_JSON" > /tmp/forecast.json

          # Write a status summary file (always commit)
          python3 - "$HEALTH" "$FINAL_STATUS" "$DEPLOY_ID" "$PROBES" "$AGENT_TALLY" "$OOM_DURING" << 'PYEOF'
          import sys, json, datetime
          health, final_status, deploy_id = sys.argv[1], sys.argv[2], sys.argv[3]
          probes = sys.argv[4] if len(sys.argv) > 4 else ""
          agent_tally = sys.argv[5] if len(sys.argv) > 5 else ""
          oom_during = sys.argv[6] if len(sys.argv) > 6 else "?"
          try:
            svc = json.load(open('/tmp/svc.json'))
            svc = svc.get('service', svc)
          except Exception:
            svc = {}
          lines = [
            f"timestamp={datetime.datetime.utcnow().isoformat()}",
            f"name={svc.get('name')}",
            f"url={svc.get('serviceDetails',{}).get('url')}",
            f"suspended={svc.get('suspended')}",
            f"new_deploy_id={deploy_id}",
            f"final_deploy_status={final_status}",
            f"agent_tally_ok_err={agent_tally}",
            f"oom_during_cycle={oom_during}",
            f"health={health}",
            f"probes={probes}",
            "",
            "=== DEPLOY TRIGGER RESPONSE ===",
          ]
          try:
            lines.append(open('/tmp/newdeploy.json').read().strip()[:500])
          except Exception:
            lines.append("(none)")
          lines.append("")
          lines.append("=== EVENTS ===")
          try:
            events = json.load(open('/tmp/events.json'))
            for e in events:
              ev = e.get('event', e)
              etype = ev.get('type','?')
              ts = ev.get('timestamp','')[:19]
              details = ev.get('details', {})
              lines.append(f"{ts} {etype}: {json.dumps(details)[:300]}")
          except Exception as ex:
            lines.append(f"events parse error: {ex}")
          lines.append("")
          lines.append("=== LIVE AI CYCLE ===")
          try:
            lines.append("agent_events=" + open('/tmp/ai_events.txt').read().strip())
          except Exception:
            lines.append("agent_events=?")
          try:
            al = open('/tmp/agent_lines.txt').read().strip()
            if al:
              lines.append("agent output sample:")
              lines.append(al)
          except Exception:
            pass
          try:
            fc = json.load(open('/tmp/forecast.json'))
            lines.append("forecast=" + json.dumps(fc)[:600])
          except Exception as ex:
            lines.append(f"forecast parse: {ex}")
          try:
            deploys = json.load(open('/tmp/deploys.json'))
            lines.append("")
            lines.append("=== DEPLOYS ===")
            for d in deploys[:5]:
              dep = d.get('deploy', d)
              lines.append(f"{dep.get('status')} | {dep.get('createdAt','')[:19]} | {dep.get('commit',{}).get('message','')[:60]}")
          except Exception:
            pass
          lines.append("")
          lines.append("=== BUILD LOG ===")
          try:
            lines.append(open('/tmp/buildlog.txt').read())
          except Exception as ex:
            lines.append(f"(no build log: {ex})")
          text = '\n'.join(lines) + '\n'
          open('render-status.txt', 'w').write(text)
          print(text)
          PYEOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git add render-status.txt
          git commit -m "ci: render deploy status [skip ci]" --allow-empty
          git push origin HEAD:"${GITHUB_REF_NAME}" || true

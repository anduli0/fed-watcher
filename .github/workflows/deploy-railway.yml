name: Deploy to Render

on:
  push:
    branches: [main, master, claude/affectionate-bell-InnQ6]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Setup Render service and env vars
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
        run: |
          set -e

          echo "=== Getting Render owner info ==="
          OWNER_RESP=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/owners?limit=1")
          echo "Owner response: $OWNER_RESP"
          OWNER_ID=$(echo "$OWNER_RESP" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data[0]['owner']['id'])
          ")
          echo "Owner ID: $OWNER_ID"

          echo "=== Checking existing services ==="
          SERVICES=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?limit=20")
          echo "Services: $SERVICES"

          SERVICE_ID=$(echo "$SERVICES" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data:
            svc = item.get('service', {})
            if 'fed-watcher' in svc.get('name','').lower():
              print(svc['id'])
              break
          " 2>/dev/null || true)

          if [ -z "$SERVICE_ID" ]; then
            echo "=== Creating new Render service ==="
            CREATE_RESP=$(curl -sf -X POST "https://api.render.com/v1/services" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                \"type\": \"web_service\",
                \"name\": \"fed-watcher-backend\",
                \"ownerId\": \"$OWNER_ID\",
                \"repo\": \"https://github.com/anduli0/fed-watcher\",
                \"autoDeploy\": \"yes\",
                \"serviceDetails\": {
                  \"env\": \"docker\",
                  \"plan\": \"free\",
                  \"region\": \"oregon\",
                  \"branch\": \"claude/affectionate-bell-InnQ6\",
                  \"dockerfilePath\": \"./Dockerfile\",
                  \"healthCheckPath\": \"/health\",
                  \"startCommand\": \"/app/docker-entrypoint.sh\"
                }
              }")
            echo "Create response: $CREATE_RESP"
            SERVICE_ID=$(echo "$CREATE_RESP" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          # response might be wrapped under 'service' key
          if 'service' in data:
            data = data['service']
          print(data['id'])
          ")
          fi

          echo "Service ID: $SERVICE_ID"

          echo "=== Patching service: branch + Docker runtime + clear start command ==="
          # Render was deploying 'master' (no Dockerfile -> buildpack -> wrong start cmd -> exit 127).
          # Force the deploy branch to the one that has the Dockerfile, and clear the
          # start-command override so the Dockerfile CMD runs.
          curl -s -X PATCH \
            "https://api.render.com/v1/services/$SERVICE_ID" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "branch": "claude/affectionate-bell-InnQ6",
              "serviceDetails": {
                "envSpecificDetails": {
                  "dockerfilePath": "./Dockerfile",
                  "dockerCommand": ""
                }
              }
            }' | python3 -c "import sys,json; d=json.load(sys.stdin); s=d.get('service',d); print('  branch=', s.get('branch'), 'runtime=', s.get('serviceDetails',{}).get('env') or s.get('serviceDetails',{}).get('runtime'))" 2>/dev/null || echo "  (patch response not JSON)"

          echo "=== Setting environment variables ==="
          ENV_VARS=$(python3 -c "
          import json, os
          vars = [
            {'key': 'ALLOWED_IPS',        'value': '*'},
            {'key': 'DEV_MODE',           'value': 'false'},
            {'key': 'JWT_SECRET',         'value': os.environ['JWT_SECRET']},
            {'key': 'ADMIN_PASSWORD_HASH','value': os.environ['ADMIN_PASSWORD_HASH']},
            {'key': 'FRED_API_KEY',       'value': os.environ['FRED_API_KEY']},
          ]
          creds = os.environ.get('CLAUDE_CREDENTIALS','')
          if creds:
            vars.append({'key': 'CLAUDE_CREDENTIALS', 'value': creds})
          print(json.dumps(vars))
          ")

          curl -sf -X PUT \
            "https://api.render.com/v1/services/$SERVICE_ID/env-vars" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$ENV_VARS"

          echo "=== Getting service URL ==="
          INFO=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID")
          URL=$(echo "$INFO" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          svc = d.get('service', d)
          print(svc.get('serviceDetails', {}).get('url', '(deploying...)'))
          " 2>/dev/null || echo "(deploying...)")
          echo "Render service URL: $URL"

          echo "=== Saving service info to file ==="
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "SERVICE_ID=$SERVICE_ID" > render-deployment.txt
          echo "URL=$URL" >> render-deployment.txt
          git add render-deployment.txt
          git diff --staged --quiet || git commit -m "ci: update Render deployment info [skip ci]"
          git push origin claude/affectionate-bell-InnQ6 || true
          echo "Saved SERVICE_ID=$SERVICE_ID and URL=$URL"

          echo ""
          echo "=== Health Check (waiting up to 60s for service to wake) ==="
          HEALTH=""
          for i in $(seq 1 6); do
            HEALTH=$(curl -sf --max-time 15 "$URL/health" 2>/dev/null || echo "")
            if [ -n "$HEALTH" ]; then break; fi
            echo "Attempt $i: service not ready yet, waiting 10s..."
            sleep 10
          done
          echo "Health response: ${HEALTH:-OFFLINE}"

          echo ""
          echo "=== /api/macro status ==="
          MACRO_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$URL/api/macro" 2>/dev/null || echo "ERR")
          echo "HTTP $MACRO_STATUS"

          echo ""
          echo "=== Render deploy status ==="
          curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys?limit=2" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for d in data[:2]:
            dep = d.get('deploy', d)
            print(f'  {dep.get(\"status\")} | {dep.get(\"createdAt\",\"\")[:19]}')
          " 2>/dev/null || echo "Could not fetch"

          # write verification result
          echo "HEALTH=${HEALTH:-OFFLINE}" >> render-deployment.txt
          echo "MACRO_HTTP=$MACRO_STATUS" >> render-deployment.txt
          git add render-deployment.txt
          git diff --staged --quiet || git commit -m "ci: add verification results [skip ci]"
          git push origin claude/affectionate-bell-InnQ6 || true
  
  check-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: deploy
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/affectionate-bell-InnQ6
      - name: Trigger deploy, poll status, write results
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set +e
          SERVICE_ID="srv-d8cecvgjs32c738puai0"

          echo "=== Current service info ==="
          curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID" > /tmp/svc.json
          cat /tmp/svc.json

          echo ""
          echo "=== Existing deploys ==="
          curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys?limit=5" > /tmp/deploys.json
          cat /tmp/deploys.json

          echo ""
          echo "=== Triggering fresh deploy (clears cache, picks up new env vars) ==="
          curl -s -X POST -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -d '{"clearCache":"clear"}' > /tmp/newdeploy.json
          cat /tmp/newdeploy.json
          DEPLOY_ID=$(python3 -c "import json; d=json.load(open('/tmp/newdeploy.json')); print(d.get('id', d.get('deploy',{}).get('id','')))" 2>/dev/null || echo "")
          echo "New deploy ID: $DEPLOY_ID"

          echo ""
          echo "=== Polling deploy status (up to 10 min) ==="
          FINAL_STATUS="unknown"
          if [ -n "$DEPLOY_ID" ]; then
            for i in $(seq 1 40); do
              sleep 15
              STATUS=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
                "https://api.render.com/v1/services/$SERVICE_ID/deploys/$DEPLOY_ID" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status', d.get('deploy',{}).get('status','?')))" 2>/dev/null || echo "?")
              echo "  [$i] status=$STATUS"
              FINAL_STATUS="$STATUS"
              case "$STATUS" in
                live|deactivated) break ;;
                build_failed|update_failed|canceled|pre_deploy_failed) break ;;
              esac
            done
          fi

          echo ""
          echo "=== Final health check ==="
          HEALTH=$(curl -sf --max-time 30 "https://fed-watcher.onrender.com/health" 2>/dev/null || echo "OFFLINE")
          echo "Health: $HEALTH"

          echo ""
          echo "=== Events (build/deploy log) ==="
          curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID/events?limit=15" > /tmp/events.json 2>/dev/null || echo '[]' > /tmp/events.json
          cat /tmp/events.json

          # Write a status summary file (always commit)
          python3 - "$HEALTH" "$FINAL_STATUS" "$DEPLOY_ID" << 'PYEOF'
          import sys, json, datetime
          health, final_status, deploy_id = sys.argv[1], sys.argv[2], sys.argv[3]
          try:
            svc = json.load(open('/tmp/svc.json'))
            svc = svc.get('service', svc)
          except Exception:
            svc = {}
          lines = [
            f"timestamp={datetime.datetime.utcnow().isoformat()}",
            f"name={svc.get('name')}",
            f"url={svc.get('serviceDetails',{}).get('url')}",
            f"suspended={svc.get('suspended')}",
            f"new_deploy_id={deploy_id}",
            f"final_deploy_status={final_status}",
            f"health={health}",
            "",
            "=== EVENTS ===",
          ]
          try:
            events = json.load(open('/tmp/events.json'))
            for e in events:
              ev = e.get('event', e)
              etype = ev.get('type','?')
              ts = ev.get('timestamp','')[:19]
              details = ev.get('details', {})
              lines.append(f"{ts} {etype}: {json.dumps(details)[:300]}")
          except Exception as ex:
            lines.append(f"events parse error: {ex}")
          try:
            deploys = json.load(open('/tmp/deploys.json'))
            lines.append("")
            lines.append("=== DEPLOYS ===")
            for d in deploys[:5]:
              dep = d.get('deploy', d)
              lines.append(f"{dep.get('status')} | {dep.get('createdAt','')[:19]} | {dep.get('commit',{}).get('message','')[:60]}")
          except Exception:
            pass
          text = '\n'.join(lines) + '\n'
          open('render-status.txt', 'w').write(text)
          print(text)
          PYEOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin claude/affectionate-bell-InnQ6 || true
          git add render-status.txt
          git commit -m "ci: render deploy status [skip ci]" --allow-empty
          git push origin claude/affectionate-bell-InnQ6 || true

  .signal-box { border-radius: 10px; padding: 0.75rem 0.85rem; font-size: 0.85rem; font-weight: 550; }

  details.arch summary::-webkit-details-marker { display: none; }
  details.arch .abody { padding: 0 0.1rem 0.7rem; font-size: 0.82rem; color: var(--muted); }

  .agrid { display: flex; flex-direction: column; gap: 0.5rem; }
  .agent { display: grid; grid-template-columns: 2rem 1fr auto; gap: 0.6rem; align-items: start; background: var(--bg); border: 1px solid var(--border); border-radius: 11px; padding: 0.65rem 0.75rem; }

function drawGauge(score, color) {
  const cx = 120, cy = 118, r = 92;
  const a0 = Math.PI, a1 = Math.PI + (score / 100) * Math.PI;
  const px = (a) => (cx + r * Math.cos(a)).toFixed(1) + "," + (cy + r * Math.sin(a)).toFixed(1);
  const doveL = LANG === "en" ? "DOVE" : "비둘기";
  const hawkL = LANG === "en" ? "HAWK" : "매파";
  $("gauge").innerHTML =
    '<path d="M' + px(a0) + ' A' + r + ',' + r + ' 0 0,1 ' + px(2 * Math.PI) + '" fill="none" stroke="var(--track)" stroke-width="13" stroke-linecap="round"/>' +
    '<path d="M' + px(a0) + ' A' + r + ',' + r + ' 0 0,1 ' + px(a1) + '" fill="none" stroke="' + color + '" stroke-width="13" stroke-linecap="round"/>' +
    '<circle cx="' + (cx + r * Math.cos(a1)).toFixed(1) + '" cy="' + (cy + r * Math.sin(a1)).toFixed(1) + '" r="8" fill="' + color + '" stroke="var(--card)" stroke-width="2"/>' +
    '<text x="' + (cx - r) + '" y="' + (cy + 13) + '" font-size="10" font-weight="700" fill="var(--dove)" text-anchor="middle">' + doveL + '</text>' +
    '<text x="' + (cx + r) + '" y="' + (cy + 13) + '" font-size="10" font-weight="700" fill="var(--hawk)" text-anchor="middle">' + hawkL + '</text>';
}

function renderHorizon() {
  const h = DATA.horizons[activeH];
  const sig = SIG_STYLE[h.signal] || SIG_STYLE.neutral;
  document.querySelectorAll("#htabs button").forEach(b => {
    const on = b.dataset.h === activeH;
    b.classList.toggle("on", on);
    b.setAttribute("aria-selected", on);
    b.style.color = on ? SIG_STYLE[DATA.horizons[b.dataset.h].signal].color : "";
  });
  const score = activeH === "6m" || activeH === "12m"
    ? DATA.hawk_dove_score
    : (h.signal === "hawkish" ? 72 : h.signal === "dovish" ? 28 : 50);
  drawGauge(score, sig.color);
  $("gsig").textContent = T().sig[h.signal];
  $("gsig").style.color = sig.color;
  $("gsub").textContent = T().gsub(h.delta_bps, T().hlabs[activeH]);
  $("gconf-v").textContent = Math.round(h.confidence * 100) + "%";
  const cb = $("gconf-bar");
  cb.style.width = (h.confidence * 100) + "%";
  cb.style.background = h.confidence >= 0.6 ? "var(--dove)" : h.confidence >= 0.4 ? "var(--gold)" : "var(--faint)";
  $("gnote").textContent = pick(h, "note", "note_en");
}

/* Trend chart: hold-prob line + USD/KRW line, indexed separately but drawn on
   a shared canvas as two normalized series (single value axis avoided). */
function renderTrend() {
  $("trend-eb").textContent = T().trendEb;
  const H = DATA.history;
  const W = 420, HT = 150, P = 26;
  const n = H.length;
  const svg = $("trend");
  if (n < 2) {
    svg.innerHTML = '<text x="' + (W / 2) + '" y="' + (HT / 2) + '" text-anchor="middle" font-size="12" fill="var(--faint)">' +
      (LANG === "en" ? "Chart appears after 2+ updates" : "업데이트가 2회 이상 쌓이면 추이가 표시됩니다") + '</text>';
    $("trend-legend").innerHTML = "";
    return;
  }
  const xs = i => P + (W - 2 * P) * (n === 1 ? 0.5 : i / (n - 1));
  const line = (vals, color, dash) => {
    const mn = Math.min(...vals), mx = Math.max(...vals);
    const span = (mx - mn) || 1;
    const ys = v => HT - P - (HT - 2 * P) * ((v - mn) / span);
    const d = vals.map((v, i) => (i ? "L" : "M") + xs(i).toFixed(1) + "," + ys(v).toFixed(1)).join(" ");
    const end = '<circle cx="' + xs(vals.length - 1).toFixed(1) + '" cy="' + ys(vals[vals.length - 1]).toFixed(1) + '" r="4" fill="' + color + '"/>';
    return '<path d="' + d + '" fill="none" stroke="' + color + '" stroke-width="2"' + (dash ? ' stroke-dasharray="4 3"' : "") + '/>' + end;
  };
  let g = '<line x1="' + P + '" y1="' + (HT - P) + '" x2="' + (W - P) + '" y2="' + (HT - P) + '" stroke="var(--border)"/>';
  g += H.map((r, i) => '<text x="' + xs(i).toFixed(1) + '" y="' + (HT - 8) + '" font-size="9" fill="var(--faint)" text-anchor="middle" class="num">' + esc(r.date) + '</text>').join("");
  g += line(H.map(r => r.hold), "var(--gold)");
  g += line(H.map(r => r.usdkrw), "var(--hawk)", true);
  svg.innerHTML = g;
  $("trend-legend").innerHTML =
    '<span><span class="sw" style="background:var(--gold)"></span>' + T().legend[0] + '</span>' +
    '<span><span class="sw" style="background:var(--hawk)"></span>' + T().legend[1] + ' (---)</span>';
}

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>환율 와쳐 — 원/달러</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💱</text></svg>">
<style>
  :root{
    --bg:#f6f7f9; --surface:#ffffff; --border:#e5e8ee;
    --ink:#151a22; --ink2:#4b5563; --ink3:#8a94a6;
    --accent:#2563eb; --accent-soft:rgba(37,99,235,.10);
    --up:#dc2626; --down:#2563eb; --flat:#6b7280;
    --ok:#15803d; --err:#b91c1c;
    --chip:#eef1f6;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0b1220; --surface:#111a2c; --border:#1f2a40;
      --ink:#e8edf5; --ink2:#aab4c5; --ink3:#6b7890;
      --accent:#5b9bff; --accent-soft:rgba(91,155,255,.12);
      --up:#f87171; --down:#5b9bff; --flat:#93a0b4;
      --ok:#4ade80; --err:#f87171;
      --chip:#1a2438;
    }
  }
  *{box-sizing:border-box; margin:0}
  html,body{background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR","Malgun Gothic",sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:760px; margin:0 auto; padding:16px 14px 40px}
  header{display:flex; align-items:center; justify-content:space-between; padding:6px 2px 14px}
  h1{font-size:17px; font-weight:700; letter-spacing:-.2px}
  h1 .sub{color:var(--ink3); font-weight:500; font-size:13px; margin-left:6px}
  .live{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink3)}
  .dot{width:8px; height:8px; border-radius:50%; background:var(--ok)}
  .dot.err{background:var(--err)}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:16px; margin-bottom:12px}
  /* hero */
  .rate-row{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap}
  .rate{font-size:44px; font-weight:800; letter-spacing:-1px; font-variant-numeric:tabular-nums}
  .rate .won{font-size:20px; font-weight:600; color:var(--ink2); margin-left:2px}
  .delta{font-size:15px; font-weight:700; font-variant-numeric:tabular-nums}
  .delta.up{color:var(--up)} .delta.down{color:var(--down)} .delta.flat{color:var(--flat)}
  .meta{margin-top:6px; font-size:12px; color:var(--ink3)}
  /* tabs + chart */
  .tabs{display:flex; gap:6px; margin:2px 0 10px}
  .tab{flex:1; border:1px solid var(--border); background:transparent; color:var(--ink2);
    border-radius:9px; padding:7px 0; font-size:13px; font-weight:600; cursor:pointer}
  .tab.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent)}
  #chartbox{position:relative}
  svg{display:block; width:100%; height:auto}
  .grid{stroke:var(--border); stroke-width:1}
  .axis{fill:var(--ink3); font-size:10px; font-variant-numeric:tabular-nums}
  .line{fill:none; stroke:var(--accent); stroke-width:2; stroke-linejoin:round; stroke-linecap:round}
  .area{fill:var(--accent); opacity:.08}
  .cross{stroke:var(--ink3); stroke-width:1; stroke-dasharray:3 3}
  .tip{position:absolute; pointer-events:none; background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:6px 9px; font-size:12px; color:var(--ink);
    box-shadow:0 4px 14px rgba(0,0,0,.12); white-space:nowrap; display:none}
  .tip b{font-variant-numeric:tabular-nums}
  .chart-note{font-size:11px; color:var(--ink3); margin-top:6px}
  /* analysis */
  .an-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px}
  .an-title{font-size:14px; font-weight:700}
  .an-time{font-size:11px; color:var(--ink3)}
  .badge{display:inline-flex; align-items:center; gap:5px; font-size:13px; font-weight:700;
    padding:5px 11px; border-radius:999px; background:var(--chip)}
  .badge.up{color:var(--up)} .badge.down{color:var(--down)} .badge.flat{color:var(--flat)}
  .range-line{font-size:13px; color:var(--ink2); margin-top:8px; font-variant-numeric:tabular-nums}
  .conf{display:flex; align-items:center; gap:8px; margin-top:8px; font-size:12px; color:var(--ink3)}
  .conf .bar{flex:1; height:6px; border-radius:4px; background:var(--chip); overflow:hidden}
  .conf .fill{height:100%; border-radius:4px; background:var(--accent)}
  .headline{font-size:15px; font-weight:700; margin:12px 0 6px; line-height:1.45}
  .commentary{font-size:13.5px; line-height:1.7; color:var(--ink2); white-space:pre-wrap}
  .drivers{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px}
  .chipd{font-size:12px; color:var(--ink2); background:var(--chip); border-radius:999px; padding:4px 10px}
  .rationale{font-size:12px; color:var(--ink3); margin-top:10px; line-height:1.6}
  .empty{color:var(--ink3); font-size:13px; line-height:1.7}
  /* context grid */
  .ctx{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px}
  .ctx .tile{background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px}
  .ctx .lab{font-size:12px; color:var(--ink3)}
  .ctx .val{font-size:18px; font-weight:700; margin-top:3px; font-variant-numeric:tabular-nums}
  .ctx .chg{font-size:12px; font-weight:600; margin-top:2px; font-variant-numeric:tabular-nums}
  footer{font-size:11.5px; color:var(--ink3); line-height:1.8; padding:8px 4px}
  .btn{border:1px solid var(--border); background:transparent; color:var(--ink2); font-size:12px;
    border-radius:8px; padding:5px 10px; cursor:pointer}
  .btn:active{background:var(--chip)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>환율 와쳐<span class="sub">원/달러 · KRW Watcher</span></h1>
    <div class="live"><span class="dot" id="dot"></span><span id="upd">연결 중…</span></div>
  </header>

  <div class="card">
    <div class="rate-row">
      <div class="rate" id="rate">—<span class="won">원</span></div>
      <div class="delta flat" id="delta">—</div>
    </div>
    <div class="meta" id="rate-meta">데이터 로딩 중…</div>
  </div>

  <div class="card" id="an-card">
    <div class="an-head">
      <span class="an-title">🤖 AI 분석 <span style="font-weight:500;color:var(--ink3)">by Claude</span></span>
      <span class="an-time" id="an-time"></span>
    </div>
    <div id="an-body"><div class="empty">아직 생성된 분석이 없습니다. 서버가 부팅 후 자동으로 첫 분석을 생성합니다 (몇 분 소요).</div></div>
  </div>

  <div class="card">
    <div class="tabs" id="tabs">
      <button class="tab on" data-r="1d">1일</button>
      <button class="tab" data-r="1w">1주</button>
      <button class="tab" data-r="1mo">1개월</button>
      <button class="tab" data-r="1y">1년</button>
    </div>
    <div id="chartbox">
      <svg id="chart" viewBox="0 0 720 260" role="img" aria-label="원/달러 환율 추이 차트"></svg>
      <div class="tip" id="tip"></div>
    </div>
    <div class="chart-note" id="chart-note"></div>
  </div>

  <div class="ctx" id="ctx"></div>

  <footer>
    이 사이트는 서버에서 24시간 스스로 동작합니다 — 환율 10분마다 수집, AI 분석은 KST 08:30 / 12:30 / 18:30 / 22:30 자동 생성.
    화면은 1분마다 자동 갱신되므로 휴대폰에서는 열어서 보기만 하면 됩니다.
  </footer>
</div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const fmt=n=>n==null?"—":Number(n).toLocaleString("ko-KR",{minimumFractionDigits:1,maximumFractionDigits:2});
const kst=iso=>{try{return new Date(iso).toLocaleString("ko-KR",{timeZone:"Asia/Seoul",month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})}catch(e){return""}};
let curRange="1d", chartPts=[], lastGood=false;

function setLive(ok,msg){ $("dot").className="dot"+(ok?"":" err"); $("upd").textContent=msg; lastGood=ok; }

async function j(url,opt){ const r=await fetch(url,opt); if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); }

async function loadLatest(){
  try{
    const d=await j("/api/latest");
    const L=d.latest||{};
    if(L.rate!=null){
      $("rate").innerHTML=fmt(L.rate)+'<span class="won">원</span>';
      const ch=L.change, pc=L.change_pct;
      const el=$("delta");
      if(ch==null){ el.textContent="전일비 —"; el.className="delta flat"; }
      else{
        const up=ch>0, flat=Math.abs(ch)<0.005;
        el.className="delta "+(flat?"flat":up?"up":"down");
        el.textContent=(flat?"— ":up?"▲ ":"▼ ")+fmt(Math.abs(ch))+"원 ("+(pc>0?"+":"")+pc+"%)";
      }
      $("rate-meta").textContent="시장가 "+(L.market_time?kst(L.market_time)+" 기준":"")+" · 소스 "+(L.source||"?")+" · 수집 "+kst(L.collected_at);
      setLive(true,"업데이트 "+kst(L.collected_at));
    }
    renderCtx(d.context||{});
  }catch(e){ setLive(false,"서버 연결 실패"); }
}

function renderCtx(c){
  const box=$("ctx"); box.innerHTML="";
  for(const k of ["dxy","us10y","usdjpy","kospi"]){
    const v=c[k]; if(!v) continue;
    const pc=v.change_pct, up=pc>0, flat=pc==null||Math.abs(pc)<0.005;
    box.insertAdjacentHTML("beforeend",
      `<div class="tile"><div class="lab">${v.label}</div><div class="val">${fmt(v.price)}</div>
       <div class="chg" style="color:var(--${flat?"flat":up?"up":"down"})">${pc==null?"":(flat?"— ":up?"▲ ":"▼ ")+Math.abs(pc)+"%"}</div></div>`);
  }
}

async function loadChart(r){
  try{
    const d=await j("/api/chart?range="+r);
    chartPts=d.points||[];
    drawChart();
    $("chart-note").textContent=chartPts.length?
      (d.stale?"오프라인 캐시 표시 중 · ":"")+"구간 "+{"1d":"1일","1w":"1주","1mo":"1개월","1y":"1년"}[r]+" · "+chartPts.length+"개 포인트":"차트 데이터를 불러오지 못했습니다.";
  }catch(e){ $("chart-note").textContent="차트 데이터를 불러오지 못했습니다."; }
}

function drawChart(){
  const svg=$("chart"); svg.innerHTML="";
  if(chartPts.length<2) return;
  const W=720,H=260,P={l:52,r:10,t:12,b:24};
  const xs=chartPts.map(p=>p[0]), ys=chartPts.map(p=>p[1]);
  const x0=Math.min(...xs),x1=Math.max(...xs);
  let y0=Math.min(...ys),y1=Math.max(...ys);
  const pad=(y1-y0)*0.08||1; y0-=pad; y1+=pad;
  const X=t=>P.l+(t-x0)/(x1-x0||1)*(W-P.l-P.r);
  const Y=v=>H-P.b-(v-y0)/(y1-y0||1)*(H-P.t-P.b);
  let g="";
  const steps=4;
  for(let i=0;i<=steps;i++){
    const v=y0+(y1-y0)*i/steps, y=Y(v);
    g+=`<line class="grid" x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}"/>`;
    g+=`<text class="axis" x="${P.l-6}" y="${y+3}" text-anchor="end">${Math.round(v).toLocaleString("ko-KR")}</text>`;
  }
  const tf=t=>{const d=new Date(t*1000);return curRange==="1d"||curRange==="1w"
    ? d.toLocaleString("ko-KR",{timeZone:"Asia/Seoul",hour:"2-digit",minute:"2-digit",...(curRange==="1w"?{month:"numeric",day:"numeric"}:{})})
    : d.toLocaleDateString("ko-KR",{timeZone:"Asia/Seoul",month:"numeric",day:"numeric",...(curRange==="1y"?{year:"2-digit"}:{})});};
  [0,.5,1].forEach(f=>{const t=x0+(x1-x0)*f;
    g+=`<text class="axis" x="${X(t)}" y="${H-8}" text-anchor="${f===0?"start":f===1?"end":"middle"}">${tf(t)}</text>`;});
  const path=chartPts.map((p,i)=>(i?"L":"M")+X(p[0]).toFixed(1)+" "+Y(p[1]).toFixed(1)).join("");
  g+=`<path class="area" d="${path} L${X(x1).toFixed(1)} ${H-P.b} L${X(x0).toFixed(1)} ${H-P.b} Z"/>`;
  g+=`<path class="line" d="${path}"/>`;
  g+=`<g id="hoverg" style="display:none"><line class="cross" id="crossx" y1="${P.t}" y2="${H-P.b}"/><circle id="hpt" r="4" fill="var(--accent)" stroke="var(--surface)" stroke-width="2"/></g>`;
  svg.innerHTML=g;
  const tip=$("tip"), box=$("chartbox"), hg=svg.querySelector("#hoverg");
  const move=ev=>{
    const r=svg.getBoundingClientRect();
    const cx=(ev.touches?ev.touches[0].clientX:ev.clientX)-r.left;
    const t=x0+((cx/r.width*W)-P.l)/(W-P.l-P.r)*(x1-x0);
    let best=0,bd=1e18;
    for(let i=0;i<chartPts.length;i++){const d=Math.abs(chartPts[i][0]-t); if(d<bd){bd=d;best=i;}}
    const p=chartPts[best], px=X(p[0]), py=Y(p[1]);
    hg.style.display="";
    svg.querySelector("#crossx").setAttribute("x1",px); svg.querySelector("#crossx").setAttribute("x2",px);
    const c=svg.querySelector("#hpt"); c.setAttribute("cx",px); c.setAttribute("cy",py);
    tip.style.display="block";
    tip.innerHTML=`<b>${fmt(p[1])}원</b><br><span style="color:var(--ink3)">${tf(p[0])}</span>`;
    const bw=box.clientWidth, tx=px/W*bw;
    tip.style.left=Math.min(Math.max(tx-40,0),bw-110)+"px";
    tip.style.top=(py/260*box.clientHeight-56)+"px";
  };
  const off=()=>{hg.style.display="none"; tip.style.display="none";};
  svg.onmousemove=move; svg.onmouseleave=off;
  svg.ontouchstart=svg.ontouchmove=ev=>{move(ev);};
  svg.ontouchend=off;
}

async function loadAnalysis(){
  try{
    const d=await j("/api/analysis");
    if(!d||d.status==="no_analysis"){ return; }
    const o=d.outlook||{};
    const dir=o.direction||"중립";
    const cls=dir.includes("상승")?"up":dir.includes("하락")?"down":"flat";
    const arrow=cls==="up"?"▲":cls==="down"?"▼":"→";
    $("an-time").textContent=d.created_kst?("생성 "+kst(d.created_kst)+" KST"):"";
    $("an-body").innerHTML=`
      <span class="badge ${cls}">${arrow} 1주 전망: ${dir}</span>
      ${o.range_low&&o.range_high?`<div class="range-line">예상 범위 <b>${fmt(o.range_low)} ~ ${fmt(o.range_high)}원</b></div>`:""}
      ${o.confidence!=null?`<div class="conf"><span>신뢰도 ${o.confidence}%</span><div class="bar"><div class="fill" style="width:${Math.max(0,Math.min(100,o.confidence))}%"></div></div></div>`:""}
      ${d.headline?`<div class="headline">${esc(d.headline)}</div>`:""}
      ${d.commentary?`<div class="commentary">${esc(d.commentary)}</div>`:""}
      ${(d.drivers||[]).length?`<div class="drivers">${d.drivers.map(x=>`<span class="chipd">${esc(x)}</span>`).join("")}</div>`:""}
      ${o.rationale?`<div class="rationale">근거: ${esc(o.rationale)}</div>`:""}`;
  }catch(e){/* keep previous */}
}
const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

$("tabs").addEventListener("click",e=>{
  const b=e.target.closest(".tab"); if(!b) return;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  b.classList.add("on"); curRange=b.dataset.r; loadChart(curRange);
});

loadLatest(); loadChart(curRange); loadAnalysis();
setInterval(loadLatest, 60*1000);
setInterval(loadAnalysis, 180*1000);
setInterval(()=>loadChart(curRange), 10*60*1000);
</script>
</body>
</html>
